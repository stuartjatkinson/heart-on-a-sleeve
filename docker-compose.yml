services:
  # Database
  database:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: heart_on_a_sleeve
      POSTGRES_USER: heart_user
      POSTGRES_PASSWORD: heart_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./db/init/02-schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heart_user -d heart_on_a_sleeve"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: stuart@stuartjatkinson.co.uk
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

  # Backend with hot-reload — source mounted so edits apply without rebuild
  backend:
    build: ./backend
    command: uvicorn app.api.router:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://heart_user:heart_password@database:5432/heart_on_a_sleeve
      OVERPASS_ENDPOINT: https://overpass-api.de/api/interpreter
      CORS_ORIGINS: http://localhost:5174,http://localhost:3000,http://localhost:8080
      DATA_DIR: /data
      PORT: "8000"
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      database:
        condition: service_healthy

  # Production-like frontend — built nginx image proxying to backend over the
  # internal Docker network. Activate with: docker compose --profile full up --build
  # Access the app at http://localhost:8080
  frontend:
    profiles: ["full"]
    build: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
