server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Increase proxy buffer sizes to handle large JWT tokens in responses
    proxy_buffer_size 128k;
    proxy_buffers 8 128k;
    proxy_busy_buffers_size 256k;
    proxy_buffering on;
    large_client_header_buffers 8 16k;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    keepalive_timeout 65;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API — BACKEND_URL is injected at container start via envsubst.
    # Strip Origin so the backend's CORS middleware won't reject proxied requests.
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Serve generated SVG/STL output files
    location /output/ {
        proxy_pass ${BACKEND_URL}/output/;
        proxy_ssl_server_name on;
        proxy_buffering on;
    }

    # FastAPI docs (dev convenience)
    location /docs {
        proxy_pass ${BACKEND_URL}/docs;
        proxy_ssl_server_name on;
    }
}