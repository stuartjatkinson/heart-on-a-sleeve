<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart on a Sleeve — SVG Preview</title>
  <script>
    if (!localStorage.getItem('hoas_token')) {
      location.replace('/login.html?returnTo=' + encodeURIComponent(location.href));
    }
  </script>
  <link rel="stylesheet" href="/app.css">
  <style>
    @keyframes page-reveal {
      from { opacity: 0; transform: scale(0.985); }
      to   { opacity: 1; transform: scale(1); }
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { animation: page-reveal 0.45s cubic-bezier(.2,.8,.4,1) both; }

    /* Two-column layout */
    #app { display: flex; width: 100%; height: 100vh; }

    #side-panel {
      width: 272px; flex-shrink: 0; height: 100vh;
      overflow-y: auto; padding: 18px 14px 24px;
      box-sizing: border-box;
    }

    #viewport {
      flex: 1; position: relative; overflow: hidden;
      cursor: grab;
    }
    #viewport.dragging  { cursor: grabbing; }
    #viewport.tilt-away {
      transform-origin: center bottom;
      transition: transform 0.65s cubic-bezier(.4,0,.8,1), opacity 0.55s ease-in;
      transform: perspective(900px) rotateX(60deg) translateY(30vh) scale(0.85);
      opacity: 0;
    }
    #svg-wrap { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
    #svg-wrap svg, #svg-wrap img { display: block; }

    /* Colour picker */
    .colour-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .colour-key-label { font-size: 10px; color: var(--text-dim); width: 54px; flex-shrink: 0; }
    .swatch-row { display: flex; gap: 4px; }
    .swatch {
      width: 20px; height: 20px; border-radius: 4px; cursor: pointer;
      border: 2px solid transparent; box-sizing: border-box;
      transition: border-color 0.1s;
    }
    .swatch:hover  { border-color: var(--border-item); }
    .swatch.active { border-color: var(--accent); }

    /* Info strip */
    #regen-status { font-size: 11px; color: var(--text-mid); min-height: 14px; margin-bottom: 6px; }
    #scale-display { font-size: 11px; color: var(--text-mid); margin-bottom: 2px; }
    #svg-size      { font-size: 10px; color: var(--text-muted); margin-bottom: 10px; }

    /* Save + user nav */
    .save-input {
      width: 100%; box-sizing: border-box; margin-bottom: 6px;
      background: var(--bg-item); border: 1.5px solid var(--border-dim);
      color: var(--text-primary); border-radius: var(--radius-input);
      padding: 7px 9px; font-size: 12px; font-family: inherit; outline: none;
    }
    .save-input:focus { border-color: var(--accent); }
    .save-input::placeholder { color: var(--text-dim); }
    #save-status { font-size: 11px; color: var(--text-mid); min-height: 14px; margin-top: 4px; }
    #user-nav { display: flex; flex-direction: column; gap: 4px; }

    #loading { z-index: 200; }

    @media (max-width: 900px) {
      #app { display: block; }
      #side-panel {
        position: fixed !important;
        bottom: 0; left: 0; right: 0; top: auto !important;
        width: 100% !important; height: auto !important;
        max-height: 75svh; max-height: 75vh;
        border-radius: 14px 14px 0 0;
        border-left: none; border-right: none; border-bottom: none;
        padding-top: 10px;
        transform: translateY(calc(100% - 80px));
        transition: transform 0.3s cubic-bezier(.25,.8,.3,1);
        z-index: 200;
        overflow-y: auto;
        overflow-x: hidden;
      }
      #side-panel.sheet-open { transform: translateY(0); }
      #viewport {
        position: fixed; inset: 0;
        width: 100% !important;
        height: 100svh !important; height: 100vh !important;
      }
    }
  </style>
</head>
<body>
<div id="loading">Rendering map…</div>

<div id="app">
  <div id="side-panel" class="panel">
    <div class="sheet-handle" id="side-handle"></div>
    <h2>SVG Preview</h2>
    <div id="regen-status"></div>
    <div id="scale-display">—</div>
    <div id="svg-size"></div>

    <div class="section">
      <h3>Map Colours</h3>
      <div id="colour-picker"></div>
    </div>

    <div class="section">
      <h3>Include</h3>
      <div class="toggle-row"><span>Place labels</span><div class="toggle on" id="tog-labels"></div></div>
      <div class="toggle-row"><span>Buildings</span>   <div class="toggle on" id="tog-buildings"></div></div>
    </div>

    <div class="divider"></div>
    <button class="btn" id="btn-fit">⊡ Fit to window</button>
    <button class="btn" id="btn-100">⊙ Actual size</button>
    <a   class="btn" id="btn-dl" download="design.svg">↓ Download SVG</a>
    <button class="btn" id="btn-3d">◉ View 3D →</button>
    <div class="divider"></div>
    <input type="text" class="save-input" id="save-name" placeholder="Design name…">
    <button class="btn" id="btn-save">💾 Save design</button>
    <div id="save-status"></div>
    <div class="divider"></div>
    <div id="user-nav"></div>
    <div class="divider"></div>
    <div class="hint">Scroll — zoom<br>Left drag — pan</div>
  </div>

  <div id="viewport">
    <div id="svg-wrap"></div>
  </div>
</div>

<script>
// ── URL params ────────────────────────────────────────────────────────────────
const params        = new URLSearchParams(location.search);
const initSvgUrl    = params.get('svg');
const west          = parseFloat(params.get('west')          ?? '0');
const south         = parseFloat(params.get('south')         ?? '0');
const east          = parseFloat(params.get('east')          ?? '0');
const north         = parseFloat(params.get('north')         ?? '0');
const merch         = params.get('merch')                    ?? 'tshirt';
const coasterShape  = params.get('coaster_shape')            ?? 'square';
const stlBuildings  = params.get('stl_buildings');
const stlLand       = params.get('stl_land');
const stlWater      = params.get('stl_water');

if (!initSvgUrl) {
  document.getElementById('loading').textContent = 'No SVG URL provided.';
  throw 0;
}

// ── Merch type gating ─────────────────────────────────────────────────────────
const is3dMerch = ['coaster', 'placemat', '3d_print'].includes(merch);
if (!is3dMerch) {
  document.getElementById('btn-3d').style.display = 'none';
  const dlBtn = document.getElementById('btn-dl');
  dlBtn.style.borderColor = '#4a9eff';
  dlBtn.style.color       = '#4a9eff';
}

// ── Colour definitions ────────────────────────────────────────────────────────
// Each swatch covers 3+ distinct hues; order: [default, ...variants]
const COLOUR_DEFS = [
  { key: 'background', label: 'Land',
    swatches: ['#EAE6DC', '#C8A878', '#A07848', '#D0C898', '#C0D4A0', '#90B868'] },
  //            warm sand   mid-brown  dk-brown   pale tan    sage       olive-grn

  { key: 'water', label: 'Water',
    swatches: ['#A8C8E8', '#6898C8', '#2D5F8A', '#7BBFBF', '#4A9898', '#3878A8'] },
  //            sky-blue   mid-blue   navy        teal       deep-teal  slate-blue

  { key: 'park', label: 'Parks',
    swatches: ['#B8D898', '#D0E890', '#80C870', '#50A858', '#407838', '#305828'] },
  //            pale-sage  lime        bright-grn  mid-grn    forest     dk-forest

  { key: 'urban_res', label: 'Urban',
    swatches: ['#E8E0D4', '#D8C8B0', '#E0E0E0', '#C8C8C8', '#D8B8D8', '#B898C8'] },
  //            warm-beige  tan         lt-grey    mid-grey   lavender   lilac

  { key: 'building', label: 'Buildings',
    swatches: ['#CEC8C0', '#A8A098', '#C8906C', '#B07050', '#D8A840', '#C88820'] },
  //            stone-grey  dk-stone    terracotta  brick      ochre      amber-org

  { key: 'road_main', label: 'Roads',
    swatches: ['#FFFFFF', '#C8C8C8', '#F8E040', '#E8A820', '#E84848', '#C82020'] },
  //            white       grey        yellow      amber      red        dk-red
];

const selectedIdx = COLOUR_DEFS.map(() => 0);
let inclLabels = true, inclBuildings = true;

function hexShade(hex, delta) {
  const r = Math.max(0, Math.min(255, parseInt(hex.slice(1, 3), 16) + delta));
  const g = Math.max(0, Math.min(255, parseInt(hex.slice(3, 5), 16) + delta));
  const b = Math.max(0, Math.min(255, parseInt(hex.slice(5, 7), 16) + delta));
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function buildOverrides() {
  const o = {};
  COLOUR_DEFS.forEach((def, i) => {
    const c = def.swatches[selectedIdx[i]];
    o[def.key] = c;
    if (def.key === 'background') o.agri      = c;
    if (def.key === 'urban_res')  o.urban_ind  = hexShade(c, -20);
    if (def.key === 'road_main')  o.road_other = hexShade(c, -15);
  });
  return o;
}

// ── Colour picker UI ──────────────────────────────────────────────────────────
function initColourPicker() {
  const container = document.getElementById('colour-picker');
  container.innerHTML = COLOUR_DEFS.map((def, i) =>
    `<div class="colour-row">` +
    `<span class="colour-key-label">${def.label}</span>` +
    `<div class="swatch-row">${def.swatches.map((c, j) =>
      `<div class="swatch${j === 0 ? ' active' : ''}" style="background:${c}"` +
      ` data-cat="${i}" data-idx="${j}"></div>`
    ).join('')}</div>` +
    `</div>`
  ).join('');
  container.addEventListener('click', e => {
    const el = e.target.closest('.swatch');
    if (!el) return;
    const cat = +el.dataset.cat, idx = +el.dataset.idx;
    selectedIdx[cat] = idx;
    container.querySelectorAll(`.swatch[data-cat="${cat}"]`).forEach((s, j) =>
      s.classList.toggle('active', j === idx));
    scheduleRegen();
  });
}

// ── Toggles ───────────────────────────────────────────────────────────────────
document.getElementById('tog-labels').addEventListener('click', function() {
  this.classList.toggle('on');
  inclLabels = this.classList.contains('on');
  scheduleRegen();
});
document.getElementById('tog-buildings').addEventListener('click', function() {
  this.classList.toggle('on');
  inclBuildings = this.classList.contains('on');
  scheduleRegen();
});

// ── SVG display ───────────────────────────────────────────────────────────────
const viewport  = document.getElementById('viewport');
const wrap      = document.getElementById('svg-wrap');
const scaleDisp = document.getElementById('scale-display');
let natW = 0, natH = 0, tx = 0, ty = 0, scale = 1;

function applyTransform() {
  wrap.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  scaleDisp.textContent = Math.round(scale * 100) + '%';
}

function fitToWindow() {
  if (!natW || !natH) return;
  const m = 40;
  scale = Math.min((viewport.clientWidth - m*2) / natW, (viewport.clientHeight - m*2) / natH);
  tx = (viewport.clientWidth  - natW * scale) / 2;
  ty = (viewport.clientHeight - natH * scale) / 2;
  applyTransform();
}

function actualSize() {
  scale = 1;
  tx = (viewport.clientWidth  - natW) / 2;
  ty = (viewport.clientHeight - natH) / 2;
  applyTransform();
}

async function displaySvg(svgText, initial) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(svgText, 'image/svg+xml');
  const svgEl  = doc.documentElement;

  natW = parseFloat(svgEl.getAttribute('width')  || '0');
  natH = parseFloat(svgEl.getAttribute('height') || '0');
  const vb = svgEl.getAttribute('viewBox');
  if (vb) {
    const p = vb.trim().split(/[\s,]+/).map(Number);
    if (p.length >= 4) { if (!natW) natW = p[2]; if (!natH) natH = p[3]; }
  }
  if (!natW) natW = 1000;
  if (!natH) natH = 1000;
  svgEl.setAttribute('width', natW);
  svgEl.setAttribute('height', natH);

  if (!initial) {
    // Cross-fade for re-renders
    wrap.style.transition = 'opacity 0.22s';
    wrap.style.opacity = '0';
    await new Promise(r => setTimeout(r, 180));
  }

  wrap.innerHTML = '';
  wrap.appendChild(svgEl);
  document.getElementById('svg-size').textContent =
    `${Math.round(natW)} × ${Math.round(natH)} px`;
  fitToWindow();

  if (!initial) {
    wrap.style.opacity = '1';
    setTimeout(() => { wrap.style.transition = ''; }, 250);
  }
}

// ── Live regeneration ─────────────────────────────────────────────────────────
let currentSvgUrl = initSvgUrl;
let regenTimer = null, regenAbort = null;
const regenEl = document.getElementById('regen-status');

function scheduleRegen() {
  if (regenTimer) clearTimeout(regenTimer);
  regenTimer = setTimeout(runRegen, 80);
}

async function runRegen() {
  if (regenAbort) regenAbort.abort();
  regenAbort = new AbortController();
  regenEl.textContent = 'Updating…';
  try {
    const resp = await fetch('/api/generate/svg', {
      method: 'POST', signal: regenAbort.signal,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bbox:              { west, south, east, north },
        merch_type:        merch,
        style:             'osm_default',
        include_labels:    inclLabels,
        include_buildings: inclBuildings,
        include_roads:     true,
        include_parks:     true,
        coaster_shape:     coasterShape,
        palette_overrides: buildOverrides(),
      }),
    });
    if (!resp.ok) throw new Error(`Server ${resp.status}`);
    const result = await resp.json();
    currentSvgUrl = result.svg_url;
    document.getElementById('btn-dl').href = currentSvgUrl;

    const text = await fetch(currentSvgUrl).then(r => r.text());
    await displaySvg(text, false);
    regenEl.textContent = '';
  } catch (e) {
    if (e.name !== 'AbortError') regenEl.textContent = `Error: ${e.message}`;
  }
}

// ── View 3D transition (SVG tilts away like a map laying flat) ────────────────
document.getElementById('btn-3d').addEventListener('click', () => {
  viewport.classList.add('tilt-away');
  setTimeout(() => {
    const p = new URLSearchParams({
      west: String(west), south: String(south),
      east: String(east), north: String(north),
      merch, style: 'osm_default', coaster_shape: coasterShape,
    });
    if (stlBuildings)  p.set('stl_buildings', stlBuildings);
    if (stlLand)       p.set('stl_land',      stlLand);
    if (stlWater)      p.set('stl_water',     stlWater);
    if (currentSvgUrl) p.set('svg',           currentSvgUrl);
    try { localStorage.setItem('hoas_palette_overrides', JSON.stringify(buildOverrides())); } catch {}
    window.location.href = `/3d-viewer.html?${p}`;
  }, 650);
});

// ── Pan & zoom ────────────────────────────────────────────────────────────────
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const r = viewport.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  tx = mx - (mx - tx) * f;
  ty = my - (my - ty) * f;
  scale = Math.max(0.01, Math.min(scale * f, 40));
  applyTransform();
}, { passive: false });

let dragging = false, lx = 0, ly = 0;
viewport.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  dragging = true; lx = e.clientX; ly = e.clientY;
  viewport.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  tx += e.clientX - lx; ty += e.clientY - ly;
  lx = e.clientX; ly = e.clientY;
  applyTransform();
});
window.addEventListener('mouseup', () => { dragging = false; viewport.classList.remove('dragging'); });
window.addEventListener('resize', fitToWindow);
document.getElementById('btn-fit').addEventListener('click', fitToWindow);
document.getElementById('btn-100').addEventListener('click', actualSize);

// ── Save project ─────────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', async () => {
  const token = localStorage.getItem('hoas_token');
  if (!token) {
    window.location.href = '/login.html?returnTo=' + encodeURIComponent(location.href);
    return;
  }
  const nameEl   = document.getElementById('save-name');
  const statusEl = document.getElementById('save-status');
  const name     = nameEl.value.trim() || `${merch} — ${new Date().toLocaleDateString('en-GB')}`;
  statusEl.textContent = 'Saving…';
  try {
    const resp = await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({
        name, merch_type: merch,
        bbox_west: west, bbox_south: south, bbox_east: east, bbox_north: north,
        style: 'osm_default', coaster_shape: coasterShape,
        palette_overrides: buildOverrides(),
        include_labels: inclLabels, include_buildings: inclBuildings,
        svg_url: currentSvgUrl || null,
        stl_buildings_url: new URLSearchParams(location.search).get('stl_buildings') || null,
        stl_land_url:      new URLSearchParams(location.search).get('stl_land')      || null,
        stl_water_url:     new URLSearchParams(location.search).get('stl_water')     || null,
      }),
    });
    if (resp.status === 401) {
      localStorage.removeItem('hoas_token');
      window.location.href = '/login.html?returnTo=' + encodeURIComponent(location.href);
      return;
    }
    if (!resp.ok) throw new Error(`Server ${resp.status}`);
    statusEl.textContent = 'Saved!';
    setTimeout(() => { statusEl.textContent = ''; }, 2500);
  } catch (e) {
    statusEl.textContent = `Error: ${e.message}`;
  }
});

// ── User nav ─────────────────────────────────────────────────────────────────
function updateUserNav() {
  const email = localStorage.getItem('hoas_email');
  const nav   = document.getElementById('user-nav');
  if (email) {
    nav.innerHTML =
      `<a href="/dashboard.html" class="btn" style="margin-bottom:4px">⊞ My Designs</a>` +
      `<button class="btn" id="logout-btn">↩ Logout</button>`;
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('hoas_token');
      localStorage.removeItem('hoas_refresh');
      localStorage.removeItem('hoas_email');
      updateUserNav();
    });
  } else {
    nav.innerHTML = `<a href="/login.html" class="btn">⊞ Login / Register</a>`;
  }
}
updateUserNav();

// ── Initialise ────────────────────────────────────────────────────────────────
document.getElementById('btn-dl').href = initSvgUrl;
initColourPicker();

fetch(initSvgUrl)
  .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
  .then(text => displaySvg(text, true))
  .then(() => { document.getElementById('loading').style.display = 'none'; })
  .catch(err => { document.getElementById('loading').textContent = `Error: ${err.message}`; });

// Touch pan + pinch zoom
(function() {
  let t0 = null, t1 = null, pinchDist = 0, pinchScale = 1;
  viewport.addEventListener('touchstart', e => {
    e.preventDefault();
    t0 = [e.touches[0].clientX, e.touches[0].clientY];
    t1 = e.touches.length > 1 ? [e.touches[1].clientX, e.touches[1].clientY] : null;
    if (t1) { pinchDist = Math.hypot(t1[0]-t0[0], t1[1]-t0[1]); pinchScale = scale; }
  }, { passive: false });
  viewport.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && t0) {
      tx += e.touches[0].clientX - t0[0];
      ty += e.touches[0].clientY - t0[1];
      t0 = [e.touches[0].clientX, e.touches[0].clientY];
      applyTransform();
    } else if (e.touches.length === 2 && t0 && t1) {
      const a = [e.touches[0].clientX, e.touches[0].clientY];
      const b = [e.touches[1].clientX, e.touches[1].clientY];
      const d = Math.hypot(b[0]-a[0], b[1]-a[1]);
      const ns = Math.max(0.05, Math.min(pinchScale * d / pinchDist, 40));
      const r  = viewport.getBoundingClientRect();
      const mx = (a[0]+b[0])/2 - r.left, my = (a[1]+b[1])/2 - r.top;
      tx = mx - (mx - tx) * (ns / scale);
      ty = my - (my - ty) * (ns / scale);
      scale = ns; t0 = a; t1 = b;
      applyTransform();
    }
  }, { passive: false });
  viewport.addEventListener('touchend', e => {
    t0 = e.touches[0] ? [e.touches[0].clientX, e.touches[0].clientY] : null;
    t1 = e.touches[1] ? [e.touches[1].clientX, e.touches[1].clientY] : null;
  }, { passive: true });
})();

// Bottom-sheet toggle
(function() {
  const panel  = document.getElementById('side-panel');
  const handle = document.getElementById('side-handle');
  if (!handle || !panel) return;
  handle.addEventListener('click', () => panel.classList.toggle('sheet-open'));
  let _ty = 0;
  panel.addEventListener('touchstart', e => { _ty = e.touches[0].clientY; }, { passive: true });
  panel.addEventListener('touchend', e => {
    const dy = _ty - e.changedTouches[0].clientY;
    if (dy > 40) panel.classList.add('sheet-open');
    else if (dy < -40) panel.classList.remove('sheet-open');
  }, { passive: true });
})();
</script>
</body>
</html>
