<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart on a Sleeve — My Designs</title>
  <script>
    if (!localStorage.getItem('hoas_token')) {
      location.replace('/login.html?returnTo=' + encodeURIComponent(location.href));
    }
  </script>
  <link rel="stylesheet" href="/app.css">
  <style>
    @keyframes page-reveal {
      from { opacity: 0; transform: scale(0.985); }
      to   { opacity: 1; transform: scale(1); }
    }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { animation: page-reveal 0.35s cubic-bezier(.2,.8,.4,1) both; }

    #app { display: flex; width: 100%; height: 100vh; }

    #side-panel {
      width: 240px; flex-shrink: 0; height: 100vh;
      overflow-y: auto; padding: 18px 14px 24px; box-sizing: border-box;
    }

    #main {
      flex: 1; overflow-y: auto; padding: 24px 28px;
      background: var(--bg-base);
    }

    #user-email { font-size: 11px; color: var(--text-dim); margin-bottom: 14px; word-break: break-all; }

    /* Project grid */
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }

    .project-card {
      background: var(--bg-panel); border: 1px solid var(--border-panel);
      border-radius: var(--radius-panel); padding: 14px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .project-card:hover { border-color: var(--border-item); }

    .card-thumb {
      width: 100%; aspect-ratio: 1; background: var(--bg-item);
      border-radius: 6px; overflow: hidden; display: flex;
      align-items: center; justify-content: center;
    }
    .card-thumb img { width: 100%; height: 100%; object-fit: contain; }
    .card-thumb .no-thumb { font-size: 32px; }

    .card-name { font-size: 13px; color: var(--text-high); font-weight: 500; }
    .card-meta { font-size: 11px; color: var(--text-dim); line-height: 1.6; }

    .card-actions { display: flex; gap: 6px; margin-top: 2px; }
    .card-actions .btn { flex: 1; padding: 6px 4px; font-size: 12px; }
    .btn-danger {
      flex: 1; padding: 6px 4px; font-size: 12px;
      background: transparent; border: 1px solid var(--border-dim);
      color: #e06060; border-radius: var(--radius-btn);
      font-family: inherit; cursor: pointer; transition: all 0.12s;
    }
    .btn-danger:hover { border-color: #e06060; background: rgba(224,96,96,0.08); }

    #empty { color: var(--text-dim); font-size: 14px; padding: 40px 0; text-align: center; }
    #loading-msg { color: var(--text-dim); font-size: 13px; padding: 20px 0; }

    .merch-emoji { font-size: 20px; }

    @media (max-width: 900px) {
      html, body { overflow: auto; }
      #app { flex-direction: column; height: auto; min-height: 100svh; min-height: 100vh; }
      #side-panel {
        width: 100% !important; height: auto !important;
        display: flex; flex-direction: row; align-items: center;
        flex-wrap: wrap; gap: 8px;
        padding: 12px 16px;
        border-radius: 0;
        border-left: none; border-right: none; border-top: none;
        overflow: visible; flex-shrink: 0;
      }
      #side-panel h2 { flex: 1; margin: 0; font-size: 14px; }
      #user-email,
      #side-panel .divider { display: none; }
      #side-panel a.btn,
      #side-panel button.btn {
        width: auto; display: inline-block;
        margin: 0; padding: 8px 12px;
      }
      #main { flex: 1; overflow-y: auto; padding: 16px; }
      #grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="side-panel" class="panel">
    <h2>My Designs</h2>
    <div id="user-email"></div>
    <a class="btn" href="/">← New design</a>
    <div class="divider"></div>
    <button class="btn" id="logout-btn">↩ Logout</button>
  </div>

  <div id="main">
    <div id="loading-msg">Loading designs…</div>
    <div id="grid" style="display:none"></div>
    <div id="empty" style="display:none">No saved designs yet.<br><a href="/" style="color:var(--accent)">Create your first one →</a></div>
  </div>
</div>

<script>
const MERCH_EMOJI = {
  tshirt: '👕', mug: '☕', tote: '👜',
  coaster: '⬜', placemat: '🟫', '3d_print': '⛰',
};

const token = localStorage.getItem('hoas_token');
if (!token) {
  window.location.href = '/login.html?returnTo=' + encodeURIComponent(location.href);
  throw 0;
}

document.getElementById('user-email').textContent = localStorage.getItem('hoas_email') || '';

document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('hoas_token');
  localStorage.removeItem('hoas_refresh');
  localStorage.removeItem('hoas_email');
  window.location.href = '/';
});

async function loadProjects() {
  const resp = await fetch('/api/projects', {
    headers: { 'Authorization': 'Bearer ' + token },
  });
  if (resp.status === 401) {
    localStorage.removeItem('hoas_token');
    window.location.href = '/login.html?returnTo=' + encodeURIComponent(location.href);
    return;
  }
  if (!resp.ok) { document.getElementById('loading-msg').textContent = 'Error loading designs.'; return; }

  const projects = await resp.json();
  document.getElementById('loading-msg').style.display = 'none';

  if (!projects.length) {
    document.getElementById('empty').style.display = 'block';
    return;
  }

  const grid = document.getElementById('grid');
  grid.style.display = 'grid';
  grid.innerHTML = projects.map(p => {
    const date = new Date(p.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    const emoji = MERCH_EMOJI[p.merch_type] || '🗺';
    const thumb = p.svg_url
      ? `<img src="${p.svg_url}" alt="design thumbnail" loading="lazy">`
      : `<span class="no-thumb">${emoji}</span>`;
    return `
      <div class="project-card" data-id="${p.id}">
        <div class="card-thumb">${thumb}</div>
        <div class="card-name">${escHtml(p.name)}</div>
        <div class="card-meta">
          ${emoji} ${p.merch_type}<br>
          ${date}
        </div>
        <div class="card-actions">
          ${p.svg_url ? `<a class="btn" href="/svg-viewer.html?${buildViewerParams(p)}" target="_blank">Open</a>` : '<span class="btn" style="opacity:.4;cursor:default">No SVG</span>'}
          <button class="btn-danger" onclick="deleteProject(${p.id}, this)">Delete</button>
        </div>
      </div>`;
  }).join('');
}

function buildViewerParams(p) {
  const q = new URLSearchParams({
    svg: p.svg_url,
    west: p.bbox.west, south: p.bbox.south,
    east: p.bbox.east, north: p.bbox.north,
    merch: p.merch_type,
  });
  if (p.stl_buildings_url) q.set('stl_buildings', p.stl_buildings_url);
  if (p.stl_land_url)      q.set('stl_land',      p.stl_land_url);
  if (p.stl_water_url)     q.set('stl_water',     p.stl_water_url);
  return q.toString();
}

async function deleteProject(id, btn) {
  if (!confirm('Delete this design?')) return;
  btn.disabled = true;
  const resp = await fetch(`/api/projects/${id}`, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token },
  });
  if (resp.ok || resp.status === 204) {
    btn.closest('.project-card').remove();
    if (!document.querySelector('.project-card')) {
      document.getElementById('grid').style.display = 'none';
      document.getElementById('empty').style.display = 'block';
    }
  } else {
    btn.disabled = false;
    alert('Delete failed.');
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadProjects();
</script>
</body>
</html>
