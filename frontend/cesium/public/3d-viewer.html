<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart on a Sleeve — 3D Map</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    /* 3D viewer layout — sidebar left, canvas right */
    body { display: flex; flex-direction: row; height: 100vh; overflow: hidden; }
    #panel3d {
      width: 272px; flex-shrink: 0; height: 100vh;
      overflow-y: auto; padding: 18px 14px 24px; box-sizing: border-box;
      border-radius: 0; border-top: none; border-bottom: none; border-left: none;
    }
    #canvas-wrap { flex: 1; position: relative; height: 100vh; overflow: hidden; }
    canvas { display: block; }
    #stats  { font-size: 10px; color: var(--text-muted); line-height: 1.9; margin-bottom: 4px; }
    #status { font-size: 11px; color: var(--text-mid);   min-height: 16px; margin-bottom: 6px; }
    /* Loading bar — bottom of canvas area */
    #loading {
      position: absolute; bottom: 0; left: 0; right: 0;
      flex-direction: row; height: 44px; padding: 0 24px; gap: 14px;
      background: rgba(5,5,8,0.82); backdrop-filter: blur(6px);
      border-top: 1px solid rgba(74,158,255,0.12);
    }
    #load-msg  { font-size: 11px; color: var(--text-dim); white-space: nowrap; min-width: 140px; }
    #load-bar-wrap { flex: 1; height: 3px; border-radius: 2px; width: auto; }
    #load-bar  { background: linear-gradient(90deg,#4a9eff,#88c4ff); transition: none; }
    /* SVG cover — starts at the source SVG viewport rect (set by inline script),
       then animates to the 3D plate position once OSM meshes are built.
       Must live OUTSIDE #canvas-wrap and use will-change so it gets its own
       GPU compositing layer above the WebGL canvas (which ignores CSS z-index). */
    #svg-cover {
      position: fixed; left: 0; top: 0; width: 100vw; height: 100vh;
      object-fit: contain; background: transparent;
      z-index: 9999; will-change: transform;
    }

    @media (max-width: 900px) {
      body { display: block; }
      #panel3d {
        position: fixed !important;
        bottom: 0; left: 0; right: 0; top: auto !important;
        width: 100% !important; height: auto !important;
        max-height: 75svh; max-height: 75vh;
        border-radius: 14px 14px 0 0;
        border-left: none; border-right: none; border-bottom: none;
        padding-top: 10px;
        transform: translateY(calc(100% - 80px));
        transition: transform 0.3s cubic-bezier(.25,.8,.3,1);
        z-index: 200;
        overflow-y: auto;
        overflow-x: hidden;
      }
      #panel3d.sheet-open { transform: translateY(0); }
      #canvas-wrap {
        position: fixed; inset: 0;
        width: 100% !important;
        height: 100svh !important; height: 100vh !important;
      }
      /* params panel: give inputs a bigger touch target */
      .param-row input[type="number"] { width: 64px; padding: 6px 5px; font-size: 13px; }
    }
  </style>
</head>
<body>
<div id="panel3d" class="panel">
  <div class="sheet-handle" id="panel3d-handle"></div>
  <button class="btn" onclick="window.parent!==window?window.parent.postMessage({type:'close-3d'},'*'):history.back()" style="margin-bottom:8px">← SVG View</button>
  <h2>3D Map Preview</h2>
  <div id="status">Loading…</div>
  <div id="stats"></div>

  <button class="btn" id="btn-mode" style="display:none">🖨 3D Print →</button>
  <button class="btn" id="btn-wire">⬡ Wireframe</button>
  <button class="btn" id="btn-rotate">▶ Auto-rotate</button>

  <div class="hint">
    Left drag — orbit<br>
    Right drag — zoom<br>
    Middle drag — pan<br>
    Scroll — zoom
  </div>
  <div class="divider"></div>
  <div id="user-email-3d" style="font-size:11px;color:var(--text-dim);padding:4px 0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
  <button class="btn" id="btn-my-designs-3d">⊞ My Designs</button>
  <button class="btn-secondary" id="btn-logout-3d" style="margin-top:4px;color:#e06060;border-color:var(--border-dim)">↩ Logout</button>
</div>
<div id="canvas-wrap">
  <div id="loading">
    <div id="load-msg">Initialising…</div>
    <div id="load-bar-wrap"><div id="load-bar"></div></div>
  </div>
</div>
<!-- svg-cover is a direct body child so it gets its own compositing layer
     above the WebGL canvas, which ignores CSS z-index when GPU-composited. -->
<img id="svg-cover" alt="" style="opacity:0">
<script>
// Runs synchronously — positions cover at source SVG rect before first paint.
(function() {
  var e = null;
  try { e = JSON.parse(localStorage.getItem('hoas_svg_entry') || 'null'); } catch(err) {}
  localStorage.removeItem('hoas_svg_entry');
  var c = document.getElementById('svg-cover');
  if (c && e) {
    c.style.left = e.x + 'px'; c.style.top = e.y + 'px';
    c.style.width = e.w + 'px'; c.style.height = e.h + 'px';
    c.style.opacity = '1';
  }
  window._svgEntry = e;
})();
</script>

<script type="importmap">
{ "imports": {
    "three":          "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE          from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { STLLoader }       from 'three/addons/loaders/STLLoader.js';

// ── URL params ────────────────────────────────────────────────────────────────
const p    = new URLSearchParams(location.search);
const west  = parseFloat(p.get('west')  ?? '-0.13');
const south = parseFloat(p.get('south') ?? '51.50');
const east  = parseFloat(p.get('east')  ?? '-0.11');
const north = parseFloat(p.get('north') ?? '51.52');
const merch        = p.get('merch') ?? '3d_print';
const coasterShape = p.get('coaster_shape') ?? 'square';
let stlBuildings = p.get('stl_buildings');
let stlLand      = p.get('stl_land');
let stlWater     = p.get('stl_water');
const svgUrl     = p.get('svg');

let paletteOverrides = null;
try { paletteOverrides = JSON.parse(localStorage.getItem('hoas_palette_overrides') || 'null'); } catch {}
localStorage.removeItem('hoas_palette_overrides');
const hasPrintParts = !!(stlBuildings && stlLand && stlWater);

// Show SVG cover immediately — persists until OSM data arrives
const svgCover = document.getElementById('svg-cover');
if (svgUrl && svgCover) svgCover.src = svgUrl;
const is3dPrint  = ['coaster', 'placemat', 'relief', '3d_print'].includes(merch);

// ── Projection ────────────────────────────────────────────────────────────────
const cx     = (east + west)  / 2;
const cy     = (north + south) / 2;
const cosLat = Math.cos(cy * Math.PI / 180);
const M      = 111_320;
const sceneW = (east - west)  * cosLat * M;
const sceneD = (north - south) * M;

function proj(lon, lat) {
  return [(lon - cx) * cosLat * M, (lat - cy) * M];
}

// ── Renderer ──────────────────────────────────────────────────────────────────
const canvasWrap = document.getElementById('canvas-wrap');
const CVPW = canvasWrap.clientWidth || (innerWidth - 272);
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(CVPW, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
canvasWrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const BG = 0x0d0e0f;
scene.background = new THREE.Color(BG);
scene.fog = new THREE.Fog(BG, sceneW * 2, sceneW * 5);

// ── Lights ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xfff5e0, 1.8);
sun.position.set(sceneW * 0.4, sceneW * 0.8, sceneD * 0.3);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { near:1, far:sceneW*4, left:-sceneW, right:sceneW, top:sceneD, bottom:-sceneD });
sun.shadow.bias = -0.0005;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x334466, 0x111118, 0.5));

// ── Camera & controls ─────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(48, CVPW / innerHeight, 1, sceneW * 20);
const fitH   = Math.max(sceneW, sceneD) * 0.9;
camera.position.set(0, fitH * 0.7, fitH);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.07;
controls.autoRotate     = false;
controls.maxPolarAngle  = Math.PI / 2 - 0.05;
controls.minDistance    = 20;
controls.maxDistance    = sceneW * 8;
// Match Cesium: left=orbit, middle=pan, right=zoom
// Note: THREE.MOUSE enum values happen to be inverted vs what OrbitControls
// uses internally, so the assignment looks swapped but produces correct behaviour.
controls.mouseButtons = {
  LEFT:   THREE.MOUSE.PAN,
  MIDDLE: THREE.MOUSE.ROTATE,
  RIGHT:  THREE.MOUSE.DOLLY,
};

// ── Fixed print-material solid colours (not scheme-dependent) ─────────────────
// Three pillars of the physical print: grey buildings, blue water, green land.
// Wireframe is per-type neon regardless.
const SOLID = {
  ground:    0x1a1e1a,
  park:      0x3a7a3a,   // green land
  water:     0x1a4070,   // blue water
  roadOther: 0x383838,   // grey road
  roadMain:  0x484848,   // lighter grey main road
  bldgLo:    0x555550,   // grey building lo
  bldgMid:   0x666660,   // grey building mid
  bldgHi:    0x8a8a84,   // grey building hi
};
const WIRE = {
  ground:    0x0a1a0a,
  park:      0x00ff66,
  water:     0x00aaff,
  roadOther: 0xff7700,
  roadMain:  0xffcc00,
  bldgLo:    0x00ffff,
  bldgMid:   0xaa44ff,
  bldgHi:    0xffffff,
};

function makeMat(type, solidKey, wireKey, extra = {}) {
  const Ctor = type === 'std' ? THREE.MeshStandardMaterial : THREE.MeshLambertMaterial;
  const m = new Ctor({ color: SOLID[solidKey], ...extra });
  m._solidColor = SOLID[solidKey];
  m._wireColor  = WIRE[wireKey];
  return m;
}

const matGround  = makeMat('lmb', 'ground',    'ground');
const matRoad    = makeMat('lmb', 'roadOther', 'roadOther');
const matRoadMn  = makeMat('lmb', 'roadMain',  'roadMain');
const matWater   = makeMat('lmb', 'water',     'water');
const matPark    = makeMat('lmb', 'park',      'park');
const matBldgLo  = makeMat('std', 'bldgLo',  'bldgLo',  { roughness:0.8, metalness:0.05 });
const matBldgMid = makeMat('std', 'bldgMid', 'bldgMid', { roughness:0.7, metalness:0.08 });
const matBldgHi  = makeMat('std', 'bldgHi',  'bldgHi',  { roughness:0.6, metalness:0.12 });

const osmMats = [matGround, matRoad, matRoadMn, matWater, matPark, matBldgLo, matBldgMid, matBldgHi];
const allMats = [...osmMats];

// ── Ground — exactly the bbox footprint ──────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(sceneW, sceneD), matGround,
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Thin border outline at the bbox edge
{
  const hw = sceneW / 2, hd = sceneD / 2;
  const pts = [
    new THREE.Vector3(-hw, 0.2, -hd), new THREE.Vector3( hw, 0.2, -hd),
    new THREE.Vector3( hw, 0.2,  hd), new THREE.Vector3(-hw, 0.2,  hd),
    new THREE.Vector3(-hw, 0.2, -hd),
  ];
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color: 0x2244aa }),
  ));
}

// ── Bbox clipping planes — applied to OSM materials only ──────────────────────
renderer.localClippingEnabled = true;
const bboxClip = [
  new THREE.Plane(new THREE.Vector3( 1, 0,  0), sceneW / 2),
  new THREE.Plane(new THREE.Vector3(-1, 0,  0), sceneW / 2),
  new THREE.Plane(new THREE.Vector3( 0, 0,  1), sceneD / 2),
  new THREE.Plane(new THREE.Vector3( 0, 0, -1), sceneD / 2),
];
osmMats.forEach(m => { m.clippingPlanes = bboxClip; });

// ── SVG ground texture — applied after entry animation for all merch types ───
let _groundTexApplied = false;
async function applyGroundTexture() {
  if (!svgUrl || _groundTexApplied) return;
  _groundTexApplied = true;
  try {
    const tex = await new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => {
        const SIZE = 2048;
        const aspect = sceneW / sceneD;
        const cw = aspect >= 1 ? SIZE : Math.round(SIZE * aspect);
        const ch = aspect >= 1 ? Math.round(SIZE / aspect) : SIZE;
        const cv = document.createElement('canvas');
        cv.width = cw; cv.height = ch;
        cv.getContext('2d').drawImage(img, 0, 0, cw, ch);
        res(new THREE.CanvasTexture(cv));
      };
      img.onerror = () => { _groundTexApplied = false; rej(new Error('img load')); };
      img.src = svgUrl;
    });
    tex.colorSpace = THREE.SRGBColorSpace;
    matGround.map = tex;
    matGround.color.set(0x000000); // start invisible — caller fades in
    matGround.needsUpdate = true;
  } catch (e) {
    console.warn('SVG ground texture failed:', e);
  }
}

// ── OSM group (all live-render meshes live here) ──────────────────────────────
const osmGroup = new THREE.Group();
scene.add(osmGroup);

// ── Progress helpers ──────────────────────────────────────────────────────────
const loadMsg  = document.getElementById('load-msg');
const loadBar  = document.getElementById('load-bar');
const statusEl = document.getElementById('status');
const statsEl  = document.getElementById('stats');
function setLoad(msg) { loadMsg.textContent = msg; }
function setStatus(msg)    { statusEl.textContent = msg; }

// ── Entry animation — buildings only (SVG texture handles land/water/roads) ───
const animMats = [matBldgLo, matBldgMid, matBldgHi];
const animGroups = [
  { mats: [matBldgLo, matBldgMid, matBldgHi], offset: 0 },
];
animMats.forEach(m => { m.wireframe = true; m.transparent = true; m.opacity = 0; m.color.set(m._wireColor); });
scene.background.set(0x000000);
if (scene.fog) scene.fog.color.set(0x000000);

let entryStart    = null;
let barStart      = 0;   // bar % at the moment entryReady fires
let barFinishing  = false;
const WIRE_MS  = 2200;
const PAUSE_MS = 300;
const FILL_MS  = 2500;
const TOTAL_MS = WIRE_MS + PAUSE_MS + FILL_MS; // 5 000 ms post-load animation

function tickEntry(now) {
  if (entryStart === null) {
    entryStart = now;
    barStart   = parseFloat(loadBar.style.width) || 0;
  }
  const elapsed = now - entryStart;

  // Progress bar: barStart → 97 % over TOTAL_MS, then 200 ms smooth finish
  if (elapsed < TOTAL_MS && !barFinishing) {
    const t = elapsed / TOTAL_MS;
    loadBar.style.width = (barStart + (97 - barStart) * t).toFixed(1) + '%';
  }

  if (elapsed >= TOTAL_MS) {
    // Finalise visual animation
    animMats.forEach(m => { m.wireframe = false; m.transparent = false; m.opacity = 1; m.color.set(m._solidColor); });
    scene.background.set(BG);
    if (scene.fog) scene.fog.color.set(BG);
    if (matGround.map) { matGround.color.set(0xffffff); matGround.needsUpdate = true; }
    if (!is3dPrint && svgUrl && !showingPreview) {
      const btn = document.getElementById('btn-mode');
      if (btn) btn.click();
    }
    // 200 ms ramp 97 % → 100 %, then fade the loading strip out
    if (!barFinishing) {
      barFinishing = true;
      const t0f = performance.now();
      const loadEl = document.getElementById('loading');
      (function barFinish(n) {
        const t = Math.min(1, (n - t0f) / 200);
        loadBar.style.width = (97 + 3 * t) + '%';
        if (t < 1) { requestAnimationFrame(barFinish); return; }
        loadEl.style.transition = 'opacity 0.3s';
        loadEl.style.opacity = '0';
        setTimeout(() => {
          loadEl.style.display = 'none';
          loadEl.style.opacity = '1';
          loadEl.style.transition = '';
        }, 350);
      })(performance.now());
    }
    return true;
  }

  if (elapsed < WIRE_MS + PAUSE_MS) {
    animGroups.forEach(({ mats, offset }) => {
      const t    = Math.max(0, Math.min(1, (elapsed - offset) / WIRE_MS));
      const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      mats.forEach(m => { m.opacity = ease; });
    });
  } else {
    const t    = Math.min(1, (elapsed - WIRE_MS - PAUSE_MS) / FILL_MS);
    const ease = 1 - Math.pow(1 - t, 2.5);
    animMats.forEach(m => {
      m.wireframe = t < 0.25;
      m.color.set(m._wireColor).lerp({ r: ((m._solidColor >> 16 & 255) / 255),
                                       g: ((m._solidColor >>  8 & 255) / 255),
                                       b: ((m._solidColor       & 255) / 255) }, ease);
      m.opacity = 1;
    });
    const bg = new THREE.Color(BG);
    scene.background.set(new THREE.Color(0).lerp(bg, ease));
    if (scene.fog) scene.fog.color.set(new THREE.Color(0).lerp(bg, ease));
  }
  return false;
}

function animateMs(ms, cb) {
  return new Promise(resolve => {
    const t0 = performance.now();
    (function tick(now) {
      const t = Math.min(1, (now - t0) / ms);
      cb(t);
      if (t < 1) requestAnimationFrame(tick);
      else resolve();
    })(performance.now());
  });
}

let entryDone  = false;
let entryReady = false; // set true once meshes are built

// ── Render loop starts now (shows dark scene during loading) ──────────────────
(function loop(now = 0) {
  requestAnimationFrame(loop);
  if (entryReady && !entryDone) entryDone = tickEntry(now);
  controls.update();
  renderer.render(scene, camera);
})();

// ── SVG ground texture — load immediately, reveal only after fold animation ───
// Storing the promise lets the fold callback trigger the fade without a race.
const groundTexPromise = svgUrl ? applyGroundTexture() : Promise.resolve();

// ── Pre-load fake-asymptotic progress bar (0 → 50 %) ─────────────────────────
const cosLatEst  = Math.cos(cy * Math.PI / 180);
const km2Est     = (east - west) * cosLatEst * 111.32 * (north - south) * 111.32;
const fetchTau   = Math.max(1500, Math.min(8000, 1000 + km2Est * 800) / 3);
let minPreload = 3000; // may be reduced if OSM data was served from cache
const fetchStart = performance.now();
(function preLoadBar(now) {
  if (entryReady) return;
  loadBar.style.width = (0.5 * (1 - Math.exp(-(now - fetchStart) / fetchTau)) * 100).toFixed(1) + '%';
  requestAnimationFrame(preLoadBar);
})(performance.now());

// ── OSM data — use sessionStorage cache from SVG page if bbox matches ─────────
let osmData;
let _usedCache = false;
const _cachedStr = localStorage.getItem('hoas_osm_cache');
if (_cachedStr) {
  try {
    const c = JSON.parse(_cachedStr);
    const b = c.bbox, T = 0.0005;
    if (Math.abs(b.west-west)<T && Math.abs(b.south-south)<T &&
        Math.abs(b.east-east)<T && Math.abs(b.north-north)<T) {
      osmData = c.data; _usedCache = true; minPreload = 800;
    }
  } catch { /* corrupt cache — fall through to network */ }
  localStorage.removeItem('hoas_osm_cache');
}

if (!_usedCache) {
  setLoad('Fetching map data…');
  const abortCtrl = new AbortController();
  const abortTmr  = setTimeout(() => abortCtrl.abort(), 60_000);
  try {
    const qs   = new URLSearchParams({ west, south, east, north });
    const resp = await fetch(`/api/osm/features?${qs}`, { signal: abortCtrl.signal });
    clearTimeout(abortTmr);
    if (!resp.ok) throw new Error(`Backend ${resp.status}`);
    osmData = await resp.json();
  } catch (e) {
    clearTimeout(abortTmr);
    setStatus(e.name === 'AbortError' ? 'Timed out — try a smaller area' : `Fetch error: ${e.message}`);
    loadMsg.textContent = 'Failed';
    throw e;
  }
} else {
  setLoad('Parsing features…');
}

setLoad('Parsing features…');

const nodes = new Map();
const ways  = [];
for (const el of osmData.elements ?? []) {
  if (el.type === 'node') nodes.set(el.id, [el.lon, el.lat]);
  else if (el.type === 'way') ways.push(el);
}

function wayPts(way) {
  return way.nodes
    .map(id => { const n = nodes.get(id); return n ? proj(n[0], n[1]) : null; })
    .filter(Boolean);
}

// ── Geometry helpers ──────────────────────────────────────────────────────────
function polyMesh(pts, elev, mat) {
  if (pts.length < 3) return null;
  const shape = new THREE.Shape(pts.map(([x, z]) => new THREE.Vector2(x, z)));
  const geo   = new THREE.ShapeGeometry(shape);
  geo.rotateX(-Math.PI / 2);
  const mesh  = new THREE.Mesh(geo, mat);
  mesh.position.y = elev;
  mesh.receiveShadow = true;
  return mesh;
}

function buildingMesh(pts, height) {
  if (pts.length < 3) return null;
  try {
    const shape = new THREE.Shape(pts.map(([x, z]) => new THREE.Vector2(x, z)));
    const geo   = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: false });
    geo.rotateX(-Math.PI / 2);
    const mat   = height > 30 ? matBldgHi : height > 12 ? matBldgMid : matBldgLo;
    const mesh  = new THREE.Mesh(geo, mat);
    mesh.castShadow = mesh.receiveShadow = true;
    return mesh;
  } catch { return null; }
}

function roadMesh(pts, width, elev, mat) {
  if (pts.length < 2) return null;
  const verts = [], idx = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const [x0, z0] = pts[i], [x1, z1] = pts[i + 1];
    const dx = x1-x0, dz = z1-z0, len = Math.hypot(dx, dz);
    if (len < 0.01) continue;
    const nx = -dz/len*width/2, nz = dx/len*width/2;
    const b = verts.length / 3;
    verts.push(x0+nx, elev, -(z0+nz),  x0-nx, elev, -(z0-nz),
               x1+nx, elev, -(z1+nz),  x1-nx, elev, -(z1-nz));
    idx.push(b, b+2, b+1,  b+1, b+2, b+3);
  }
  if (!verts.length) return null;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  return mesh;
}

// ── Render OSM features into osmGroup ─────────────────────────────────────────
setLoad('Rendering features…');

const ROAD_W    = { motorway:8, trunk:7, primary:6, secondary:5,
                    tertiary:4, residential:3, unclassified:3, service:2, living_street:2.5 };
const ROAD_MAIN = new Set(['motorway','trunk','primary','secondary']);
let nBuildings = 0;

for (const way of ways) {
  const tags = way.tags ?? {};
  // Roads, water, parks are shown by the SVG ground texture — only extrude buildings.
  if (tags.building && tags.building !== 'no') {
    const pts  = wayPts(way);
    const levels = parseFloat(tags['building:levels'] ?? '2');
    const height = parseFloat(tags['building:height'] ?? String(levels * 3.2));
    const m = buildingMesh(pts, Math.max(height, 3));
    if (m) { osmGroup.add(m); nBuildings++; }
  }
}

// Enforce minimum pre-load before the post-load animation starts
const preElapsed = performance.now() - fetchStart;
if (preElapsed < minPreload) await new Promise(r => setTimeout(r, minPreload - preElapsed));

controls.update();
setStatus('');
statsEl.textContent = `${nBuildings} buildings`;
setLoad('Building scene…');
entryReady = true; // hand off to tickEntry — bar takes over at 50 %

// THREE.js fold-in animation — quick-fade the CSS cover then fold an SVG plane
// from vertical (upright at the south/front edge) down to lie flat on the ground.
// Pivot is at world (0, 0, sceneD/2); rotation.x goes from 0 → -PI/2.
if (svgUrl) {
  if (svgCover) {
    svgCover.style.transition = 'opacity 0.25s ease';
    svgCover.style.opacity = '0';
    setTimeout(function() { if (svgCover && svgCover.parentNode) svgCover.remove(); }, 300);
  }
  new THREE.TextureLoader().load(svgUrl, function(fTex) {
    fTex.colorSpace = THREE.SRGBColorSpace;
    const fMat = new THREE.MeshBasicMaterial({
      map: fTex, side: THREE.DoubleSide,
      transparent: true, opacity: 1.0,
      depthWrite: false,
      polygonOffset: true, polygonOffsetFactor: -1, polygonOffsetUnits: -1,
    });
    const fMesh = new THREE.Mesh(new THREE.PlaneGeometry(sceneW, sceneD), fMat);
    // Offset plane center so its bottom edge sits at the group pivot point
    fMesh.position.set(0, sceneD / 2, 0);
    const fGroup = new THREE.Group();
    fGroup.position.set(0, 0, sceneD / 2); // pivot at south/front edge of ground
    fGroup.add(fMesh);
    scene.add(fGroup);

    const FOLD_MS = 600;
    const t0fold = performance.now();
    (function animFold(now) {
      const prog = Math.min(1, (now - t0fold) / FOLD_MS);
      const ease = 1 - Math.pow(1 - prog, 3);
      fGroup.rotation.x = -Math.PI / 2 * ease;
      if (prog < 1) { requestAnimationFrame(animFold); return; }
      // Fold complete — fade out over 400ms
      const t0fade = performance.now();
      (function animFade(now2) {
        const fp = Math.min(1, (now2 - t0fade) / 400);
        fMat.opacity = 1 - fp;
        if (fp < 1) { requestAnimationFrame(animFade); return; }
        scene.remove(fGroup);
        fMat.dispose();
        fMesh.geometry.dispose();
        // Fold done — fade in SVG ground texture over 600 ms
        groundTexPromise.then(() => {
          if (!matGround.map) return;
          const t0gnd = performance.now();
          (function fadeGnd(now3) {
            const ease = Math.min(1, (now3 - t0gnd) / 600);
            matGround.color.setRGB(ease, ease, ease);
            matGround.needsUpdate = true;
            if (ease < 1) requestAnimationFrame(fadeGnd);
          })(performance.now());
        });
      })(performance.now());
    })(performance.now());
  });
}

// ── Fabric Preview — SVG texture + buildings (non-3D merch only) ─────────────
const fabricGroup = new THREE.Group();
fabricGroup.visible = false;
scene.add(fabricGroup);

const btnMode = document.getElementById('btn-mode');
if (is3dPrint && hasPrintParts) {
  btnMode.style.display = 'block';
  btnMode.textContent = '🖨 3D Print →';
} else if (!is3dPrint && svgUrl) {
  btnMode.style.display = 'block';
  btnMode.textContent = '🖼 Fabric Preview';
}

let fabricLoaded = false;

async function loadFabricPreview() {
  if (fabricLoaded) return;
  setStatus('Building fabric preview…');

  // SVG as ground texture — rasterise via <img>→<canvas> for reliable WebGL support
  if (svgUrl) {
    try {
      const tex = await new Promise((res, rej) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const SIZE = 2048;
          const aspect = sceneW / sceneD;
          const cw = aspect >= 1 ? SIZE : Math.round(SIZE * aspect);
          const ch = aspect >= 1 ? Math.round(SIZE / aspect) : SIZE;
          const cv = document.createElement('canvas');
          cv.width = cw; cv.height = ch;
          cv.getContext('2d').drawImage(img, 0, 0, cw, ch);
          const t = new THREE.CanvasTexture(cv);
          t.colorSpace = THREE.SRGBColorSpace;
          res(t);
        };
        img.onerror = rej;
        img.src = svgUrl;
      });
      const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(sceneW, sceneD),
        new THREE.MeshBasicMaterial({ map: tex }),
      );
      plane.rotation.x = -Math.PI / 2;
      plane.position.y = 0.05;
      fabricGroup.add(plane);
    } catch (e) {
      console.warn('SVG texture load failed:', e);
    }
  }

  // Buildings only — roads/water/parks are visible in the SVG texture
  for (const way of ways) {
    const tags = way.tags ?? {};
    if (tags.building && tags.building !== 'no') {
      const pts = wayPts(way);
      const levels = parseFloat(tags['building:levels'] ?? '2');
      const height = parseFloat(tags['building:height'] ?? String(levels * 3.2));
      const m = buildingMesh(pts, Math.max(height, 3));
      if (m) fabricGroup.add(m);
    }
  }

  fabricLoaded = true;
  setStatus('');
}

// ── 3D Print navigation (for 3D merch) ───────────────────────────────────────
if (is3dPrint && hasPrintParts) {
  btnMode?.addEventListener('click', () => {
    localStorage.setItem('hoas_print_data', JSON.stringify({
      west, south, east, north,
      stl_buildings_url: stlBuildings,
      stl_land_url: stlLand,
      stl_water_url: stlWater,
      svg_url: svgUrl,
      merch_type: merch,
      coaster_shape: coasterShape,
      palette_overrides: paletteOverrides,
    }));
    window.location.href = '/3d-print.html';
  });
}

// ── Fabric preview toggle (for non-3D merch) ─────────────────────────────────
let showingPreview = false;

if (!is3dPrint) {
  btnMode?.addEventListener('click', async function() {
    if (!showingPreview) {
      this.textContent = 'Loading…';
      this.classList.add('on');
      await loadFabricPreview();
      fabricGroup.visible = true;
      osmGroup.visible    = false;
      showingPreview      = true;
      this.textContent    = '🌍 Map View';
    } else {
      showingPreview      = false;
      osmGroup.visible    = true;
      ground.visible      = true;
      fabricGroup.visible = false;
      if (matGround.map) { matGround.color.set(0xffffff); matGround.needsUpdate = true; }
      this.textContent    = '🖼 Fabric Preview';
      this.classList.remove('on');
    }
  });
}

// ── Wireframe toggle ──────────────────────────────────────────────────────────
let wireframe = false;
document.getElementById('btn-wire').addEventListener('click', function() {
  wireframe = !wireframe;
  scene.background.set(wireframe ? 0x000000 : BG);
  if (scene.fog) scene.fog.color.set(wireframe ? 0x000000 : BG);
  allMats.forEach(m => {
    m.wireframe = wireframe;
    m.color.set(wireframe ? m._wireColor : m._solidColor);
  });
  this.classList.toggle('on', wireframe);
  this.textContent = wireframe ? '⬡ Solid' : '⬡ Wireframe';
});

// ── User section ─────────────────────────────────────────────────────────────
const emailEl3d = document.getElementById('user-email-3d');
if (emailEl3d) emailEl3d.textContent = localStorage.getItem('hoas_email') || '';
document.getElementById('btn-my-designs-3d')?.addEventListener('click', () => {
  if (window.parent !== window) window.parent.postMessage({ type: 'open-designs' }, '*');
});
document.getElementById('btn-logout-3d')?.addEventListener('click', () => {
  if (window.parent !== window) window.parent.postMessage({ type: 'logout' }, '*');
});

// ── Auto-rotate ───────────────────────────────────────────────────────────────
document.getElementById('btn-rotate').addEventListener('click', function() {
  controls.autoRotate = !controls.autoRotate;
  this.classList.toggle('on', controls.autoRotate);
  this.textContent = controls.autoRotate ? '⏸ Pause' : '▶ Auto-rotate';
});

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const W = canvasWrap.clientWidth, H = innerHeight;
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// ── Mobile bottom-sheet toggle ────────────────────────────────────────────────
(function() {
  const panel  = document.getElementById('panel3d');
  const handle = document.getElementById('panel3d-handle');
  if (!handle || !panel) return;
  handle.addEventListener('click', () => panel.classList.toggle('sheet-open'));
  let _ty = 0;
  panel.addEventListener('touchstart', e => { _ty = e.touches[0].clientY; }, { passive: true });
  panel.addEventListener('touchend', e => {
    const dy = _ty - e.changedTouches[0].clientY;
    if (dy > 40) panel.classList.add('sheet-open');
    else if (dy < -40) panel.classList.remove('sheet-open');
  }, { passive: true });
})();

</script>
