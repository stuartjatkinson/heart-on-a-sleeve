<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Heart on a Sleeve — 3D Map</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0e0f; overflow: hidden; font-family: system-ui, sans-serif; }
    canvas { display: block; }

    #overlay {
      position: absolute; top: 20px; left: 20px;
      background: rgba(8,8,12,0.93); border: 1px solid #1e1e2a;
      border-radius: 10px; padding: 14px 16px; backdrop-filter: blur(10px);
      color: #888; font-size: 12px; min-width: 180px; z-index: 10;
    }
    #overlay h2 { font-size: 13px; color: #ddd; font-weight: 600; margin-bottom: 8px; }
    #stats  { font-size: 10px; color: #444; line-height: 1.9; margin-bottom: 4px; }
    #status { font-size: 11px; color: #666; min-height: 16px; margin-bottom: 6px; }
    .btn {
      display: block; width: 100%; margin-top: 6px; padding: 7px;
      background: transparent; border: 1px solid #1e1e2a; border-radius: 6px;
      color: #555; font-size: 11px; cursor: pointer; text-align: center;
      transition: all 0.12s; text-decoration: none;
    }
    .btn:hover { border-color: #4a9eff; color: #4a9eff; }
    .btn.on    { border-color: #4a9eff; color: #4a9eff; background: rgba(74,158,255,0.06); }
    .divider   { border-top: 1px solid #12121a; margin: 8px 0 4px; }
    .dl-label  { font-size: 10px; color: #2a2a36; margin-bottom: 2px; }
    .param-row { display:flex; align-items:center; gap:4px; margin:3px 0; font-size:10px; color:#444; }
    .param-row label { min-width:72px; color:#555; }
    .param-row input { width:46px; background:#0e0e14; border:1px solid #2a2a36; border-radius:3px;
                       color:#aaa; font-size:10px; padding:2px 4px; text-align:center; }
    .param-row span  { color:#333; }
    #hint { font-size: 10px; color: #1e1e2a; margin-top: 8px; line-height: 1.9;
            border-top: 1px solid #12121a; padding-top: 7px; }

    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #0d0e0f;
      color: #444; font-size: 13px; gap: 12px; z-index: 20;
    }
    #load-bar-wrap { width: 200px; height: 2px; background: #1a1a24; border-radius: 1px; }
    #load-bar { height: 100%; background: #4a9eff; border-radius: 1px; width: 0; transition: width 0.3s; }
  </style>
</head>
<body>
<div id="loading">
  <div id="load-msg">Initialising…</div>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
</div>

<div id="overlay">
  <h2>3D Map Preview</h2>
  <div id="status">Loading…</div>
  <div id="stats"></div>

  <button class="btn" id="btn-mode" style="display:none">🖨 Print Preview</button>
  <button class="btn" id="btn-wire">⬡ Wireframe</button>
  <button class="btn" id="btn-rotate">▶ Auto-rotate</button>

  <div id="stl-links" style="display:none">
    <div class="divider"></div>
    <div class="dl-label">Download print files (3 colours):</div>
    <a class="btn" id="dl-buildings" download="buildings.stl">↓ Buildings (grey)</a>
    <a class="btn" id="dl-land"      download="land.stl">↓ Land (green)</a>
    <a class="btn" id="dl-water"     download="water.stl">↓ Water (blue)</a>
  </div>

  <div id="params-panel" style="display:none">
    <div class="divider"></div>
    <div class="dl-label">Layer heights (mm)</div>
    <div class="param-row"><label>Buildings 0 →</label><input type="number" id="p-bldg-h"   value="4"   step="0.5" min="1" max="20"><span>mm</span></div>
    <div class="param-row"><label>Water</label><input type="number" id="p-water-s" value="1"   step="0.5" min="0" max="10">→<input type="number" id="p-water-e" value="2" step="0.5" min="0" max="10"><span>mm</span></div>
    <div class="param-row"><label>Land</label><input type="number" id="p-land-s"  value="2"   step="0.5" min="0" max="10">→<input type="number" id="p-land-e"  value="3" step="0.5" min="0" max="10"><span>mm</span></div>
    <div class="dl-label" style="margin-top:6px">Processing</div>
    <div class="param-row"><label>Gap close</label><input type="number" id="p-gap"    value="0.8" step="0.1" min="0" max="5"><span>mm</span></div>
    <div class="param-row"><label>Water expand</label><input type="number" id="p-wexp" value="0.5" step="0.1" min="0" max="3"><span>mm</span></div>
    <div class="param-row"><label>Min bldg h</label><input type="number" id="p-minb"  value="1"   step="0.5" min="0.5" max="5"><span>mm</span></div>
    <div class="param-row"><label>Collar width</label><input type="number" id="p-col" value="1"   step="0.5" min="0" max="5"><span>mm</span></div>
    <button class="btn" id="btn-regen" style="margin-top:6px;border-color:#4a9eff;color:#4a9eff">⟳ Regenerate STL</button>
    <div id="regen-status" style="font-size:10px;color:#555;margin-top:4px;text-align:center"></div>
  </div>

  <button class="btn" onclick="window.close()">✕ Close</button>
  <div id="hint">
    Left drag — orbit<br>
    Right drag — zoom<br>
    Middle drag — pan<br>
    Scroll — zoom
  </div>
</div>

<script type="importmap">
{ "imports": {
    "three":          "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE          from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { STLLoader }       from 'three/addons/loaders/STLLoader.js';

// ── URL params ────────────────────────────────────────────────────────────────
const p    = new URLSearchParams(location.search);
const west  = parseFloat(p.get('west')  ?? '-0.13');
const south = parseFloat(p.get('south') ?? '51.50');
const east  = parseFloat(p.get('east')  ?? '-0.11');
const north = parseFloat(p.get('north') ?? '51.52');
const merch = p.get('merch') ?? '3d_print';
let stlBuildings = p.get('stl_buildings');
let stlLand      = p.get('stl_land');
let stlWater     = p.get('stl_water');
const hasPrintParts = !!(stlBuildings && stlLand && stlWater);

// ── Projection ────────────────────────────────────────────────────────────────
const cx     = (east + west)  / 2;
const cy     = (north + south) / 2;
const cosLat = Math.cos(cy * Math.PI / 180);
const M      = 111_320;
const sceneW = (east - west)  * cosLat * M;
const sceneD = (north - south) * M;

function proj(lon, lat) {
  return [(lon - cx) * cosLat * M, (lat - cy) * M];
}

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const BG = 0x0d0e0f;
scene.background = new THREE.Color(BG);
scene.fog = new THREE.Fog(BG, sceneW * 2, sceneW * 5);

// ── Lights ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xfff5e0, 1.8);
sun.position.set(sceneW * 0.4, sceneW * 0.8, sceneD * 0.3);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { near:1, far:sceneW*4, left:-sceneW, right:sceneW, top:sceneD, bottom:-sceneD });
sun.shadow.bias = -0.0005;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x334466, 0x111118, 0.5));

// ── Camera & controls ─────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 1, sceneW * 20);
const fitH   = Math.max(sceneW, sceneD) * 0.9;
camera.position.set(0, fitH * 0.7, fitH);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping  = true;
controls.dampingFactor  = 0.07;
controls.autoRotate     = false;
controls.maxPolarAngle  = Math.PI / 2 - 0.05;
controls.minDistance    = 20;
controls.maxDistance    = sceneW * 8;
// Match Cesium: left=orbit, middle=pan, right=zoom
// Note: THREE.MOUSE enum values happen to be inverted vs what OrbitControls
// uses internally, so the assignment looks swapped but produces correct behaviour.
controls.mouseButtons = {
  LEFT:   THREE.MOUSE.PAN,
  MIDDLE: THREE.MOUSE.ROTATE,
  RIGHT:  THREE.MOUSE.DOLLY,
};

// ── Fixed print-material solid colours (not scheme-dependent) ─────────────────
// Three pillars of the physical print: grey buildings, blue water, green land.
// Wireframe is per-type neon regardless.
const SOLID = {
  ground:    0x1a1e1a,
  park:      0x3a7a3a,   // green land
  water:     0x1a4070,   // blue water
  roadOther: 0x383838,   // grey road
  roadMain:  0x484848,   // lighter grey main road
  bldgLo:    0x555550,   // grey building lo
  bldgMid:   0x666660,   // grey building mid
  bldgHi:    0x8a8a84,   // grey building hi
};
const WIRE = {
  ground:    0x0a1a0a,
  park:      0x00ff66,
  water:     0x00aaff,
  roadOther: 0xff7700,
  roadMain:  0xffcc00,
  bldgLo:    0x00ffff,
  bldgMid:   0xaa44ff,
  bldgHi:    0xffffff,
};

function makeMat(type, solidKey, wireKey, extra = {}) {
  const Ctor = type === 'std' ? THREE.MeshStandardMaterial : THREE.MeshLambertMaterial;
  const m = new Ctor({ color: SOLID[solidKey], ...extra });
  m._solidColor = SOLID[solidKey];
  m._wireColor  = WIRE[wireKey];
  return m;
}

const matGround  = makeMat('lmb', 'ground',    'ground');
const matRoad    = makeMat('lmb', 'roadOther', 'roadOther');
const matRoadMn  = makeMat('lmb', 'roadMain',  'roadMain');
const matWater   = makeMat('lmb', 'water',     'water');
const matPark    = makeMat('lmb', 'park',      'park');
const matBldgLo  = makeMat('std', 'bldgLo',  'bldgLo',  { roughness:0.8, metalness:0.05 });
const matBldgMid = makeMat('std', 'bldgMid', 'bldgMid', { roughness:0.7, metalness:0.08 });
const matBldgHi  = makeMat('std', 'bldgHi',  'bldgHi',  { roughness:0.6, metalness:0.12 });

const osmMats = [matGround, matRoad, matRoadMn, matWater, matPark, matBldgLo, matBldgMid, matBldgHi];
const allMats = [...osmMats]; // print part mats added later

// ── Ground + grid ─────────────────────────────────────────────────────────────
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(sceneW + 400, sceneD + 400), matGround,
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(Math.max(sceneW, sceneD) * 1.2, 30, 0x2244aa, 0x1a3366);
scene.add(grid);

// ── OSM group (all live-render meshes live here) ──────────────────────────────
const osmGroup = new THREE.Group();
scene.add(osmGroup);

// ── Progress helpers ──────────────────────────────────────────────────────────
const loadMsg  = document.getElementById('load-msg');
const loadBar  = document.getElementById('load-bar');
const statusEl = document.getElementById('status');
const statsEl  = document.getElementById('stats');
function setLoad(msg, pct) { loadMsg.textContent = msg; loadBar.style.width = pct + '%'; }
function setStatus(msg)    { statusEl.textContent = msg; }

// ── Fetch OSM via backend proxy ────────────────────────────────────────────────
setLoad('Fetching map data…', 10);
const abortCtrl = new AbortController();
const abortTmr  = setTimeout(() => abortCtrl.abort(), 60_000);

let osmData;
try {
  const qs   = new URLSearchParams({ west, south, east, north });
  const resp = await fetch(`/api/osm/features?${qs}`, { signal: abortCtrl.signal });
  clearTimeout(abortTmr);
  if (!resp.ok) throw new Error(`Backend ${resp.status}`);
  osmData = await resp.json();
} catch (e) {
  clearTimeout(abortTmr);
  setStatus(e.name === 'AbortError' ? 'Timed out — try a smaller area' : `Fetch error: ${e.message}`);
  document.getElementById('loading').style.display = 'none';
  throw e;
}

setLoad('Parsing features…', 40);

const nodes = new Map();
const ways  = [];
for (const el of osmData.elements ?? []) {
  if (el.type === 'node') nodes.set(el.id, [el.lon, el.lat]);
  else if (el.type === 'way') ways.push(el);
}

function wayPts(way) {
  return way.nodes
    .map(id => { const n = nodes.get(id); return n ? proj(n[0], n[1]) : null; })
    .filter(Boolean);
}

// ── Geometry helpers ──────────────────────────────────────────────────────────
function polyMesh(pts, elev, mat) {
  if (pts.length < 3) return null;
  const shape = new THREE.Shape(pts.map(([x, z]) => new THREE.Vector2(x, z)));
  const geo   = new THREE.ShapeGeometry(shape);
  geo.rotateX(-Math.PI / 2);
  const mesh  = new THREE.Mesh(geo, mat);
  mesh.position.y = elev;
  mesh.receiveShadow = true;
  return mesh;
}

function buildingMesh(pts, height) {
  if (pts.length < 3) return null;
  try {
    const shape = new THREE.Shape(pts.map(([x, z]) => new THREE.Vector2(x, z)));
    const geo   = new THREE.ExtrudeGeometry(shape, { depth: height, bevelEnabled: false });
    geo.rotateX(-Math.PI / 2);
    const mat   = height > 30 ? matBldgHi : height > 12 ? matBldgMid : matBldgLo;
    const mesh  = new THREE.Mesh(geo, mat);
    mesh.castShadow = mesh.receiveShadow = true;
    return mesh;
  } catch { return null; }
}

function roadMesh(pts, width, elev, mat) {
  if (pts.length < 2) return null;
  const verts = [], idx = [];
  for (let i = 0; i < pts.length - 1; i++) {
    const [x0, z0] = pts[i], [x1, z1] = pts[i + 1];
    const dx = x1-x0, dz = z1-z0, len = Math.hypot(dx, dz);
    if (len < 0.01) continue;
    const nx = -dz/len*width/2, nz = dx/len*width/2;
    const b = verts.length / 3;
    verts.push(x0+nx, elev, z0+nz,  x0-nx, elev, z0-nz,
               x1+nx, elev, z1+nz,  x1-nx, elev, z1-nz);
    idx.push(b, b+2, b+1,  b+1, b+2, b+3);
  }
  if (!verts.length) return null;
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  return mesh;
}

// ── Render OSM features into osmGroup ─────────────────────────────────────────
setLoad('Rendering features…', 60);

const ROAD_W    = { motorway:8, trunk:7, primary:6, secondary:5,
                    tertiary:4, residential:3, unclassified:3, service:2, living_street:2.5 };
const ROAD_MAIN = new Set(['motorway','trunk','primary','secondary']);
let nBuildings = 0, nRoads = 0;

for (const way of ways) {
  const tags = way.tags ?? {};
  const pts  = wayPts(way);

  if (tags.landuse === 'park'  || tags.landuse === 'recreation_ground' ||
      tags.landuse === 'grass' || tags.landuse === 'meadow' ||
      tags.leisure === 'park'  || tags.leisure === 'garden' || tags.leisure === 'common') {
    const m = polyMesh(pts, 0.1, matPark);
    if (m) osmGroup.add(m);
    continue;
  }
  if (tags.natural === 'water' || tags.landuse === 'reservoir') {
    const m = polyMesh(pts, 0.05, matWater);
    if (m) osmGroup.add(m);
    continue;
  }
  if (tags.waterway) {
    const w = tags.waterway === 'river' ? 8 : tags.waterway === 'canal' ? 5 : 2;
    const m = roadMesh(pts, w, 0.05, matWater);
    if (m) osmGroup.add(m);
    continue;
  }
  if (tags.highway && ROAD_W[tags.highway]) {
    const m = roadMesh(pts, ROAD_W[tags.highway], 0.2,
                       ROAD_MAIN.has(tags.highway) ? matRoadMn : matRoad);
    if (m) { osmGroup.add(m); nRoads++; }
    continue;
  }
  if (tags.building && tags.building !== 'no') {
    const levels = parseFloat(tags['building:levels'] ?? '2');
    const height = parseFloat(tags['building:height'] ?? String(levels * 3.2));
    const m = buildingMesh(pts, Math.max(height, 3));
    if (m) { osmGroup.add(m); nBuildings++; }
  }
}

setLoad('Done', 100);
controls.update();
setStatus('');
statsEl.textContent = `${nBuildings} buildings · ${nRoads} roads`;
document.getElementById('loading').style.display = 'none';

// ── Print Preview — load the 3 STL pieces ────────────────────────────────────
const printGroup = new THREE.Group();
printGroup.visible = false;
scene.add(printGroup);

// Print material colors — same three-color scheme as the physical print
const PRINT_MAT = {
  buildings: { solid: 0x909088, wire: WIRE.bldgLo  },
  land:      { solid: 0x4a8a4a, wire: WIRE.park     },
  water:     { solid: 0x2a6aaa, wire: WIRE.water    },
};

if (hasPrintParts) {
  document.getElementById('btn-mode').style.display = 'block';
  document.getElementById('stl-links').style.display = 'block';
  document.getElementById('dl-buildings').href = stlBuildings;
  document.getElementById('dl-land').href      = stlLand;
  document.getElementById('dl-water').href     = stlWater;
}

let printLoaded = false;

async function loadPrintParts() {
  if (printLoaded) return;
  setStatus('Loading print model…');

  const loader = new STLLoader();
  const defs = [
    { url: stlBuildings, key: 'buildings' },
    { url: stlLand,      key: 'land'      },
    { url: stlWater,     key: 'water'     },
  ];

  // Load all three, preserving relative positions (no individual centering)
  for (const { url, key } of defs) {
    try {
      const geo = await new Promise((res, rej) => loader.load(url, res, undefined, rej));
      geo.computeVertexNormals();
      // Rotate STL Z-up → Three.js Y-up
      geo.rotateX(-Math.PI / 2);

      const cfg = PRINT_MAT[key];
      const mat = new THREE.MeshStandardMaterial({
        color: cfg.solid, roughness: 0.65, metalness: 0.05,
      });
      mat._solidColor = cfg.solid;
      mat._wireColor  = cfg.wire;
      allMats.push(mat);

      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = mesh.receiveShadow = true;
      printGroup.add(mesh);
    } catch (err) {
      console.warn(`Failed to load ${key} STL:`, err);
    }
  }

  // Centre the whole group (all 3 parts together, preserving their relative positions)
  const box = new THREE.Box3().setFromObject(printGroup);
  const centre = new THREE.Vector3();
  box.getCenter(centre);
  printGroup.position.set(-centre.x, -box.min.y, -centre.z);

  printLoaded = true;
  setStatus('');
}

let showingPrint = false;

document.getElementById('btn-mode')?.addEventListener('click', async function() {
  if (!showingPrint) {
    this.textContent = 'Loading…';
    this.classList.add('on');
    await loadPrintParts();
    showingPrint   = true;
    osmGroup.visible   = false;
    printGroup.visible = true;
    this.textContent = '🌍 Map View';
  } else {
    showingPrint       = false;
    osmGroup.visible   = true;
    printGroup.visible = false;
    this.textContent = '🖨 Print Preview';
    this.classList.remove('on');
  }
});

// ── Wireframe toggle ──────────────────────────────────────────────────────────
let wireframe = false;
document.getElementById('btn-wire').addEventListener('click', function() {
  wireframe = !wireframe;
  scene.background.set(wireframe ? 0x000000 : BG);
  if (scene.fog) scene.fog.color.set(wireframe ? 0x000000 : BG);
  allMats.forEach(m => {
    m.wireframe = wireframe;
    m.color.set(wireframe ? m._wireColor : m._solidColor);
  });
  grid.material[0].color.set(wireframe ? 0x0055ff : 0x2244aa);
  grid.material[1].color.set(wireframe ? 0x003399 : 0x1a3366);
  this.classList.toggle('on', wireframe);
  this.textContent = wireframe ? '⬡ Solid' : '⬡ Wireframe';
});

// ── Parameters panel + live regenerate ───────────────────────────────────────
if (hasPrintParts) {
  document.getElementById('params-panel').style.display = 'block';

  // Populate inputs from URL defaults
  const pGet = (id, def) => { const el = document.getElementById(id); if (el) el.value = def; };
  pGet('p-bldg-h',  4);   pGet('p-water-s', 1);  pGet('p-water-e', 2);
  pGet('p-land-s',  2);   pGet('p-land-e',  3);
  pGet('p-gap',   0.8);   pGet('p-wexp',  0.5);   pGet('p-minb',   1);

  document.getElementById('btn-regen').addEventListener('click', async function() {
    const regenStatus = document.getElementById('regen-status');
    this.disabled = true;
    this.textContent = '⟳ Regenerating…';
    regenStatus.textContent = 'Fetching new STL from backend…';

    const body = {
      bbox:  { west, south, east, north },
      merch_type:      merch,
      bldg_height:     parseFloat(document.getElementById('p-bldg-h').value),
      water_start:     parseFloat(document.getElementById('p-water-s').value),
      water_end:       parseFloat(document.getElementById('p-water-e').value),
      land_start:      parseFloat(document.getElementById('p-land-s').value),
      land_end:        parseFloat(document.getElementById('p-land-e').value),
      gap_close_mm:    parseFloat(document.getElementById('p-gap').value),
      water_expand_mm: parseFloat(document.getElementById('p-wexp').value),
      min_bldg_mm:     parseFloat(document.getElementById('p-minb').value),
      collar_mm:       parseFloat(document.getElementById('p-col').value),
    };

    try {
      const resp  = await fetch('/api/generate/stl', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });
      if (!resp.ok) throw new Error(`Server ${resp.status}`);
      const result = await resp.json();

      // Update download links
      stlBuildings = result.stl_buildings_url;
      stlLand      = result.stl_land_url;
      stlWater     = result.stl_water_url;
      document.getElementById('dl-buildings').href = stlBuildings;
      document.getElementById('dl-land').href      = stlLand;
      document.getElementById('dl-water').href     = stlWater;

      // Reload print preview with new parts
      printGroup.clear();
      printLoaded = false;

      if (showingPrint) {
        await loadPrintParts();
      }

      regenStatus.textContent = 'Done ✓';
      setTimeout(() => { regenStatus.textContent = ''; }, 3000);
    } catch (err) {
      regenStatus.textContent = `Error: ${err.message}`;
    } finally {
      this.disabled = false;
      this.textContent = '⟳ Regenerate STL';
    }
  });
}

// ── Auto-rotate ───────────────────────────────────────────────────────────────
document.getElementById('btn-rotate').addEventListener('click', function() {
  controls.autoRotate = !controls.autoRotate;
  this.classList.toggle('on', controls.autoRotate);
  this.textContent = controls.autoRotate ? '⏸ Pause' : '▶ Auto-rotate';
});

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Render loop ───────────────────────────────────────────────────────────────
(function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
</script>
</body>
</html>
