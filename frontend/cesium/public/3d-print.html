<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart on a Sleeve — 3D Print Preview</title>
  <link rel="stylesheet" href="/app.css">
  <style>
    body { display: flex; flex-direction: row; height: 100vh; overflow: hidden; }
    #print-panel {
      width: 272px; flex-shrink: 0; height: 100vh;
      overflow-y: auto; padding: 18px 14px 24px; box-sizing: border-box;
      border-radius: 0; border-top: none; border-bottom: none; border-left: none;
    }
    #canvas-wrap { flex: 1; position: relative; height: 100vh; overflow: hidden; }
    canvas { display: block; }
    #status-print { font-size: 11px; color: var(--text-mid); min-height: 14px; margin-bottom: 6px; }
    #regen-status-print { font-size: 10px; color: var(--text-dim); margin-top: 4px; min-height: 14px; }
    #loading-print {
      position: absolute; bottom: 0; left: 0; right: 0;
      display: flex; flex-direction: row; height: 44px; padding: 0 24px; gap: 14px;
      align-items: center;
      background: rgba(5,5,8,0.82); backdrop-filter: blur(6px);
      border-top: 1px solid rgba(74,158,255,0.12);
    }
    #load-msg-print { font-size: 11px; color: var(--text-dim); white-space: nowrap; min-width: 140px; }
    #load-bar-wrap-print { flex: 1; height: 3px; background: var(--bg-item); border-radius: 2px; overflow: hidden; }
    #load-bar-print { height: 100%; background: linear-gradient(90deg,#4a9eff,#88c4ff); width: 0%; transition: none; border-radius: 2px; }
    .dl-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; margin-top: 4px; }

    @media (max-width: 900px) {
      body { display: block; }
      #print-panel {
        position: fixed !important;
        bottom: 0; left: 0; right: 0; top: auto !important;
        width: 100% !important; height: auto !important;
        max-height: 75svh; max-height: 75vh;
        border-radius: 14px 14px 0 0;
        border-left: none; border-right: none; border-bottom: none;
        padding-top: 10px;
        transform: translateY(calc(100% - 80px));
        transition: transform 0.3s cubic-bezier(.25,.8,.3,1);
        z-index: 200;
        overflow-y: auto; overflow-x: hidden;
      }
      #print-panel.sheet-open { transform: translateY(0); }
      #canvas-wrap { position: fixed; inset: 0; width: 100% !important; height: 100svh !important; height: 100vh !important; }
    }
  </style>
</head>
<body>

<script>
// Auth guard
(function() {
  var token = localStorage.getItem('hoas_token');
  if (!token) { location.replace('/login.html?returnTo=' + encodeURIComponent(location.href)); return; }
  try {
    var payload = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    if (payload.exp && payload.exp * 1000 < Date.now()) {
      localStorage.removeItem('hoas_token'); localStorage.removeItem('hoas_refresh');
      location.replace('/login.html?returnTo=' + encodeURIComponent(location.href));
    }
  } catch(e) {
    localStorage.removeItem('hoas_token'); localStorage.removeItem('hoas_refresh');
    location.replace('/login.html?returnTo=' + encodeURIComponent(location.href));
  }
})();
</script>

<div id="print-panel" class="panel">
  <div class="sheet-handle" id="print-handle"></div>
  <button class="btn" id="btn-print-back" style="margin-bottom:8px">← 3D Map</button>
  <h2>3D Print Preview</h2>
  <div id="status-print"></div>

  <button class="btn" id="btn-print-wire">⬡ Wireframe</button>
  <button class="btn" id="btn-print-rotate">▶ Auto-rotate</button>

  <div class="divider"></div>
  <div class="dl-label">Download print files:</div>
  <a class="btn" id="dl-solid-print"     download="solid.stl"     style="display:none;border-color:#4a7a4a;color:#6aaa6a">↓ Solid STL (1-colour)</a>
  <a class="btn" id="dl-buildings-print" download="buildings.stl">↓ Buildings (grey)</a>
  <a class="btn" id="dl-land-print"      download="land.stl">↓ Land (green)</a>
  <a class="btn" id="dl-water-print"     download="water.stl">↓ Water (blue)</a>

  <div class="divider"></div>
  <button class="btn" id="btn-print-regen" style="border-color:#4a9eff;color:#4a9eff">⟳ Regenerate STL</button>
  <div id="regen-status-print"></div>

  <div class="divider"></div>
  <input type="text" class="save-input" id="print-save-name" placeholder="Design name…">
  <button class="btn" id="print-save-btn">💾 Save Design</button>
  <div id="print-save-status" style="font-size:11px;color:var(--text-mid);min-height:14px;margin-top:4px;"></div>

  <div class="divider"></div>
  <div class="user-nav-slot"></div>
</div>

<div id="canvas-wrap">
  <div id="loading-print">
    <div id="load-msg-print">Loading…</div>
    <div id="load-bar-wrap-print"><div id="load-bar-print"></div></div>
  </div>
</div>

<script type="importmap">
{ "imports": {
    "three":         "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE        from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader }     from 'three/addons/loaders/STLLoader.js';

// ── Print data from localStorage ──────────────────────────────────────────────
let printData = null;
try { printData = JSON.parse(localStorage.getItem('hoas_print_data') || 'null'); } catch {}

const statusEl = document.getElementById('status-print');
if (!printData || !printData.stl_buildings_url) {
  statusEl.textContent = 'No print data — please go back to the 3D map.';
  document.getElementById('loading-print').style.display = 'none';
}

let stlB = printData?.stl_buildings_url ?? null;
let stlL = printData?.stl_land_url      ?? null;
let stlW = printData?.stl_water_url     ?? null;
let stlS = printData?.stl_solid_url     ?? null;
const west            = printData?.west             ?? 0;
const south           = printData?.south            ?? 0;
const east            = printData?.east             ?? 0.01;
const north           = printData?.north            ?? 0.01;
const merch           = printData?.merch_type       ?? '3d_print';
const coasterShape    = printData?.coaster_shape    ?? null;
const paletteOverrides= printData?.palette_overrides?? null;

// ── Scene geometry ────────────────────────────────────────────────────────────
const cx = (east + west) / 2, cy = (north + south) / 2;
const cosLat = Math.cos(cy * Math.PI / 180);
const M = 111_320;
const sceneW = (east - west) * cosLat * M;
const sceneD = (north - south) * M;

// ── Renderer ─────────────────────────────────────────────────────────────────
const canvasWrap = document.getElementById('canvas-wrap');
const W = canvasWrap.clientWidth || (innerWidth - 272);
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(W, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
canvasWrap.appendChild(renderer.domElement);

// ── Scene, lights ─────────────────────────────────────────────────────────────
const BG = 0x0d0e0f;
const scene = new THREE.Scene();
scene.background = new THREE.Color(BG);
scene.fog = new THREE.Fog(BG, sceneW * 2, sceneW * 5);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xfff5e0, 1.8);
sun.position.set(sceneW * 0.4, sceneW * 0.8, sceneD * 0.3);
sun.castShadow = true; sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { near:1, far:sceneW*4, left:-sceneW, right:sceneW, top:sceneD, bottom:-sceneD });
sun.shadow.bias = -0.0005;
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x334466, 0x111118, 0.5));

// ── Camera & controls ─────────────────────────────────────────────────────────
const fitH = Math.max(sceneW, sceneD) * 0.9;
const camera = new THREE.PerspectiveCamera(48, W / innerHeight, 1, sceneW * 20);
camera.position.set(0, fitH * 0.7, fitH);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
Object.assign(controls, {
  enableDamping: true, dampingFactor: 0.07, autoRotate: false,
  maxPolarAngle: Math.PI / 2 - 0.05, minDistance: 20, maxDistance: sceneW * 8,
});
controls.mouseButtons = { LEFT: THREE.MOUSE.PAN, MIDDLE: THREE.MOUSE.ROTATE, RIGHT: THREE.MOUSE.DOLLY };

// ── Print materials ───────────────────────────────────────────────────────────
const PRINT_MAT = {
  buildings: { solid: 0x909088, wire: 0x00ffff },
  land:      { solid: 0x4a8a4a, wire: 0x00ff66 },
  water:     { solid: 0x2a6aaa, wire: 0x00aaff },
};
const allMats = [];

// ── Print groups ─────────────────────────────────────────────────────────────
const printGroup = new THREE.Group();
scene.add(printGroup);

const printLayers = {
  buildings: new THREE.Group(),
  water:     new THREE.Group(),
  land:      new THREE.Group(),
};
Object.values(printLayers).forEach(g => { g.visible = false; printGroup.add(g); });
const baseplateGroup = new THREE.Group();
baseplateGroup.visible = false;
printGroup.add(baseplateGroup);
const printLayerMats = { buildings: null, water: null, land: null };
let _watRestLocalY = 4/3, _lndRestLocalY = 8/3;

// ── Render loop ───────────────────────────────────────────────────────────────
(function loop() {
  requestAnimationFrame(loop);
  controls.update();
  renderer.render(scene, camera);
})();

// ── Helpers ───────────────────────────────────────────────────────────────────
function animMs(ms, cb) {
  return new Promise(resolve => {
    const t0 = performance.now();
    (function tick(now) {
      const t = Math.min(1, (now - t0) / ms);
      cb(t); if (t < 1) requestAnimationFrame(tick); else resolve();
    })(performance.now());
  });
}

// ── Load STL parts ────────────────────────────────────────────────────────────
async function loadPrintParts(b, l, w) {
  const loader = new STLLoader();
  for (const [url, key] of [[b,'buildings'],[l,'land'],[w,'water']]) {
    if (!url) continue;
    try {
      const geo = await new Promise((res, rej) => loader.load(url, res, undefined, rej));
      geo.rotateX(-Math.PI / 2); geo.computeVertexNormals();
      const cfg = PRINT_MAT[key];
      const mat = new THREE.MeshStandardMaterial({ color: cfg.solid, roughness: 0.65, metalness: 0.05 });
      mat._solidColor = cfg.solid; mat._wireColor = cfg.wire;
      allMats.push(mat); printLayerMats[key] = mat;
      const mesh = new THREE.Mesh(geo, mat); mesh.castShadow = mesh.receiveShadow = true;
      printLayers[key].add(mesh);
    } catch(e) { console.warn(`STL ${key}:`, e); }
  }

  Object.values(printLayers).forEach(g => { g.visible = true; });
  const sz = new THREE.Vector3();
  new THREE.Box3().setFromObject(printGroup).getSize(sz);
  const scaleX = sz.x > 0 ? sceneW / sz.x : 1;
  const scaleZ = sz.z > 0 ? sceneD / sz.z : 1;
  printGroup.scale.set(scaleX, scaleX, scaleZ);
  const worldBox = new THREE.Box3().setFromObject(printGroup);
  const centre = new THREE.Vector3(); worldBox.getCenter(centre);
  printGroup.position.set(-centre.x, -worldBox.min.y + 1, -centre.z);
  _watRestLocalY = 4/3; _lndRestLocalY = 8/3;

  const bldWB = new THREE.Box3().setFromObject(printLayers.buildings);
  const bpW = sz.x, bpD = sz.z, bpH = 0.008 * Math.max(bpW, bpD);
  const bpMat = new THREE.MeshStandardMaterial({ color: 0x787870, roughness: 0.85, metalness: 0.04 });
  bpMat._solidColor = 0x787870; bpMat._wireColor = 0x778899; allMats.push(bpMat);
  const bpMesh = new THREE.Mesh(new THREE.BoxGeometry(bpW, bpH, bpD), bpMat);
  bpMesh.castShadow = bpMesh.receiveShadow = true;
  const bldLocalMinY = (bldWB.min.y - printGroup.position.y) / scaleX;
  bpMesh.position.set(centre.x / scaleX, bldLocalMinY - bpH/2, centre.z / scaleZ);
  baseplateGroup.add(bpMesh);
  Object.values(printLayers).forEach(g => { g.visible = false; });
}

async function runPrintAnim() {
  const fl = Math.max(sceneW, sceneD) * 0.14 / printGroup.scale.y;
  const [bM, wM, lM] = [printLayerMats.buildings, printLayerMats.water, printLayerMats.land];

  baseplateGroup.visible = true;
  if (bM) { bM.wireframe=false; bM.transparent=true; bM.opacity=0; bM.color.set(bM._solidColor); }
  printLayers.buildings.visible = true;
  await animMs(900, t => { if (bM) bM.opacity = t < 0.5 ? 2*t*t : -1+(4-2*t)*t; });
  if (bM) { bM.transparent=false; bM.opacity=1; }

  await new Promise(r => setTimeout(r, 200));
  if (wM) { wM.wireframe=false; wM.transparent=false; wM.color.set(wM._solidColor); }
  printLayers.water.position.y = _watRestLocalY + fl;
  printLayers.water.visible = true;
  await animMs(900, t => { printLayers.water.position.y = _watRestLocalY + fl * Math.pow(1-t, 3); });
  printLayers.water.position.y = _watRestLocalY;

  await new Promise(r => setTimeout(r, 150));
  if (lM) { lM.wireframe=false; lM.transparent=false; lM.color.set(lM._solidColor); }
  printLayers.land.position.y = _lndRestLocalY + fl * 1.3;
  printLayers.land.visible = true;
  await animMs(900, t => { printLayers.land.position.y = _lndRestLocalY + fl * 1.3 * Math.pow(1-t, 3); });
  printLayers.land.position.y = _lndRestLocalY;
}

// ── Initial load + animation ──────────────────────────────────────────────────
const loadMsg = document.getElementById('load-msg-print');
const loadBar = document.getElementById('load-bar-print');

if (stlB && stlL && stlW) {
  loadMsg.textContent = 'Loading STL files…';
  // Animate progress bar in parallel
  const barStart = performance.now();
  const barDur = 3200;
  (function barLoop(now) {
    const t = Math.min(1, (now - barStart) / barDur);
    loadBar.style.width = (t * 97).toFixed(1) + '%';
    if (t < 1) requestAnimationFrame(barLoop);
  })(performance.now());

  try {
    await loadPrintParts(stlB, stlL, stlW);
    loadMsg.textContent = 'Assembling layers…';
    await runPrintAnim();
    loadBar.style.width = '100%';
    const loadEl = document.getElementById('loading-print');
    loadEl.style.transition = 'opacity 0.3s';
    loadEl.style.opacity = '0';
    setTimeout(() => { loadEl.style.display='none'; loadEl.style.opacity='1'; loadEl.style.transition=''; }, 350);
  } catch(e) {
    statusEl.textContent = 'Failed to load STL: ' + e.message;
    document.getElementById('loading-print').style.display = 'none';
  }
} else {
  document.getElementById('loading-print').style.display = 'none';
}

// ── Download links ────────────────────────────────────────────────────────────
if (stlB) document.getElementById('dl-buildings-print').href = stlB;
if (stlL) document.getElementById('dl-land-print').href = stlL;
if (stlW) document.getElementById('dl-water-print').href = stlW;
if (stlS) { const el = document.getElementById('dl-solid-print'); el.href = stlS; el.style.display = ''; }

// ── Wireframe toggle ──────────────────────────────────────────────────────────
let wireframe = false;
document.getElementById('btn-print-wire').addEventListener('click', function() {
  wireframe = !wireframe;
  scene.background.set(wireframe ? 0x000000 : BG);
  if (scene.fog) scene.fog.color.set(wireframe ? 0x000000 : BG);
  allMats.forEach(m => { m.wireframe = wireframe; m.color.set(wireframe ? m._wireColor : m._solidColor); });
  this.classList.toggle('on', wireframe);
  this.textContent = wireframe ? '⬡ Solid' : '⬡ Wireframe';
});

// ── Auto-rotate ───────────────────────────────────────────────────────────────
document.getElementById('btn-print-rotate').addEventListener('click', function() {
  controls.autoRotate = !controls.autoRotate;
  this.classList.toggle('on', controls.autoRotate);
  this.textContent = controls.autoRotate ? '⏸ Pause' : '▶ Auto-rotate';
});

// ── Back button ───────────────────────────────────────────────────────────────
document.getElementById('btn-print-back').addEventListener('click', () => history.back());

// ── Regenerate ────────────────────────────────────────────────────────────────
document.getElementById('btn-print-regen').addEventListener('click', async function() {
  const rs = document.getElementById('regen-status-print');
  this.disabled = true; this.textContent = '⟳ Regenerating…'; rs.textContent = 'Fetching…';
  try {
    const r = await fetch('/api/generate/stl', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ bbox: { west, south, east, north }, merch_type: merch, coaster_shape: coasterShape }),
    });
    if (!r.ok) throw new Error(`Server ${r.status}`);
    const res = await r.json();
    stlB = res.stl_buildings_url; stlL = res.stl_land_url;
    stlW = res.stl_water_url;     stlS = res.stl_solid_url;
    // Update localStorage
    if (printData) {
      printData.stl_buildings_url = stlB; printData.stl_land_url = stlL;
      printData.stl_water_url = stlW;     printData.stl_solid_url = stlS;
      localStorage.setItem('hoas_print_data', JSON.stringify(printData));
    }
    if (stlB) document.getElementById('dl-buildings-print').href = stlB;
    if (stlL) document.getElementById('dl-land-print').href = stlL;
    if (stlW) document.getElementById('dl-water-print').href = stlW;
    if (stlS) { const el = document.getElementById('dl-solid-print'); el.href = stlS; el.style.display = ''; }
    // Reset and re-animate
    printGroup.scale.set(1,1,1); printGroup.position.set(0,0,0);
    Object.values(printLayers).forEach(g => { g.clear(); g.visible = false; g.position.y = 0; });
    baseplateGroup.clear(); baseplateGroup.visible = false;
    await loadPrintParts(stlB, stlL, stlW);
    await runPrintAnim();
    rs.textContent = 'Done ✓'; setTimeout(() => { rs.textContent = ''; }, 3000);
  } catch(e) { rs.textContent = `Error: ${e.message}`; }
  finally { this.disabled = false; this.textContent = '⟳ Regenerate STL'; }
});

// ── Save ─────────────────────────────────────────────────────────────────────
document.getElementById('print-save-btn').addEventListener('click', async function() {
  const token = localStorage.getItem('hoas_token');
  if (!token) { location.href = '/login.html?returnTo=' + encodeURIComponent(location.href); return; }
  const nameEl   = document.getElementById('print-save-name');
  const saveStatus = document.getElementById('print-save-status');
  const name = nameEl.value.trim() || `${merch || 'design'} — ${new Date().toLocaleDateString('en-GB')}`;
  saveStatus.textContent = 'Saving…';
  let thumbnail = null;
  try {
    renderer.render(scene, camera);
    const src = renderer.domElement;
    const cv = document.createElement('canvas'); cv.width = cv.height = 150;
    const ctx = cv.getContext('2d');
    const minDim = Math.min(src.width, src.height);
    ctx.drawImage(src, (src.width-minDim)/2, (src.height-minDim)/2, minDim, minDim, 0, 0, 150, 150);
    thumbnail = cv.toDataURL('image/webp', 0.7);
  } catch { /* non-critical */ }
  try {
    const resp = await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({
        name, merch_type: merch,
        bbox_west: west, bbox_south: south, bbox_east: east, bbox_north: north,
        coaster_shape: coasterShape, palette_overrides: paletteOverrides,
        thumbnail_data_url: thumbnail,
      }),
    });
    if (resp.status === 401) {
      localStorage.removeItem('hoas_token');
      location.href = '/login.html'; return;
    }
    if (!resp.ok) throw new Error(`Server ${resp.status}`);
    saveStatus.textContent = 'Saved!';
    setTimeout(() => { saveStatus.textContent = ''; }, 2500);
  } catch(e) { saveStatus.textContent = `Error: ${e.message}`; }
});

// ── User nav ─────────────────────────────────────────────────────────────────
const email = localStorage.getItem('hoas_email') || '';
const navSlot = document.querySelector('.user-nav-slot');
if (navSlot) {
  navSlot.innerHTML = email
    ? `<div class="user-email-display">${email}</div>
       <button class="btn-secondary" id="btn-logout-print" style="margin-top:4px">↩ Logout</button>`
    : `<a href="/login.html" class="btn">Sign in</a>`;
  document.getElementById('btn-logout-print')?.addEventListener('click', () => {
    ['hoas_token','hoas_refresh','hoas_email'].forEach(k => localStorage.removeItem(k));
    location.href = '/login.html';
  });
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const W = canvasWrap.clientWidth, H = innerHeight;
  camera.aspect = W / H; camera.updateProjectionMatrix();
  renderer.setSize(W, H);
});

// ── Mobile bottom-sheet ───────────────────────────────────────────────────────
(function() {
  const panel = document.getElementById('print-panel');
  const handle = document.getElementById('print-handle');
  if (!handle) return;
  handle.addEventListener('click', () => panel.classList.toggle('sheet-open'));
  let _ty = 0;
  panel.addEventListener('touchstart', e => { _ty = e.touches[0].clientY; }, { passive: true });
  panel.addEventListener('touchend', e => {
    const dy = _ty - e.changedTouches[0].clientY;
    if (dy > 40) panel.classList.add('sheet-open');
    else if (dy < -40) panel.classList.remove('sheet-open');
  }, { passive: true });
})();
</script>
</body>
</html>
