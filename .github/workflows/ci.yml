name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Quality gates ─────────────────────────────────────────────────────────────

  lint-backend:
    name: Lint backend (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check backend/

  typecheck-frontend:
    name: Type-check frontend (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/cesium/package-lock.json
      - run: npm ci
        working-directory: frontend/cesium
      - run: npx tsc --noEmit
        working-directory: frontend/cesium

  scan-secrets:
    name: Scan for secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — catches secrets in old commits too
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/
      - name: Scan
        run: gitleaks detect --source . --exit-code 1

  # ── Build validation ──────────────────────────────────────────────────────────

  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: heart-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/cesium/package-lock.json
      - run: npm ci
        working-directory: frontend/cesium
      - run: npm run build
        working-directory: frontend/cesium
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: heart-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish images (main branch only) ────────────────────────────────────────
  # Pushes tagged images to ghcr.io on every merge to main.
  # Images are public by default (matching a public repo) — make the package
  # private in GitHub → Packages → heart-on-a-sleeve if needed.

  publish-images:
    name: Push to ghcr.io
    needs: [lint-backend, typecheck-frontend, build-frontend, scan-secrets]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
      - uses: docker/setup-buildx-action@v3
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/hoas-backend:latest
            ghcr.io/${{ env.OWNER }}/hoas-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/hoas-frontend:latest
            ghcr.io/${{ env.OWNER }}/hoas-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Cloud Run ───────────────────────────────────────────────────────
  # Dormant until you set GCP_PROJECT_ID in repo Variables (Settings → Secrets and variables → Variables).
  # One-time GCP setup instructions are in docs/DEPLOY.md.
  #
  # Variables needed (Settings → Variables):
  #   GCP_PROJECT_ID   — your GCP project ID e.g. heart-on-a-sleeve-123456
  #   GCP_REGION       — e.g. europe-west2  (London)
  #   FRONTEND_URL     — set after first deploy (Cloud Run frontend URL or custom domain)
  #
  # Secrets needed (Settings → Secrets):
  #   GCP_WORKLOAD_IDENTITY_PROVIDER  — projects/NUMBER/locations/global/workloadIdentityPools/...
  #   GCP_SERVICE_ACCOUNT             — hoas-deployer@PROJECT.iam.gserviceaccount.com
  #   DATABASE_URL                    — postgresql+asyncpg://user:pass@/db?host=/cloudsql/PROJECT:REGION:INSTANCE
  #   SECRET_KEY                      — random 64-char string (python -c "import secrets; print(secrets.token_hex(32))")

  deploy:
    name: Deploy to Cloud Run
    needs: [publish-images]
    if: github.ref == 'refs/heads/main' && vars.GCP_PROJECT_ID != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation (no stored key)
    env:
      REGION: ${{ vars.GCP_REGION || 'europe-west2' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend to Artifact Registry
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/hoas/hoas-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend to Artifact Registry
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/hoas/hoas-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: hoas-backend
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/hoas/hoas-backend:${{ github.sha }}
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            CORS_ORIGINS=${{ vars.FRONTEND_URL || '*' }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --add-cloudsql-instances=${{ vars.GCP_PROJECT_ID }}:${{ env.REGION }}:hoas-db

      - name: Deploy frontend
        id: deploy-frontend
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: hoas-frontend
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/hoas/hoas-frontend:${{ github.sha }}
          env_vars: |
            BACKEND_URL=${{ steps.deploy-backend.outputs.url }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=3
            --memory=256Mi
            --cpu=1
            --concurrency=1000

      - name: Print URLs
        run: |
          echo "Backend:  ${{ steps.deploy-backend.outputs.url }}"
          echo "Frontend: ${{ steps.deploy-frontend.outputs.url }}"
